<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>🎬 Omniplex Wigan — Film Schedule</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0d0d0f;
    --surface: #16171a;
    --surface2: #1e2024;
    --border: #2a2d34;
    --accent: #e8c45a;
    --accent2: #e06a3f;
    --new: #4ade80;
    --rerelease: #60a5fa;
    --text: #e8e9ec;
    --muted: #7a7d88;
    --danger: #f87171;
    --owen: #a78bfa;
    --conor: #34d399;
    --alice: #f472b6;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* TOP NAV */
  .top-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px 0;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .top-bar h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    color: var(--accent);
    line-height: 1;
    margin-bottom: 12px;
  }
  .top-bar h1 span { color: var(--text); opacity: 0.5; }

  .tab-row {
    display: flex;
    gap: 0;
    overflow-x: auto;
    scrollbar-width: none;
    -ms-overflow-style: none;
  }
  .tab-row::-webkit-scrollbar { display: none; }

  .tab {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--muted);
    padding: 8px 14px;
    border: none;
    background: none;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: color 0.2s, border-color 0.2s;
  }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab:hover:not(.active) { color: var(--text); }

  /* CONTENT */
  .page { display: none; padding: 16px; }
  .page.active { display: block; }

  /* WEEK HEADER */
  .week-header {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 16px;
  }
  .week-header h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 2px;
    color: var(--accent);
  }
  .week-header .subtitle {
    font-size: 12px;
    color: var(--muted);
  }

  /* DAY BLOCK */
  .day-block {
    margin-bottom: 12px;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .day-block.has-film { border-color: var(--accent); }

  .day-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 14px;
    background: var(--surface);
  }
  .day-header .day-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 1px;
    color: var(--muted);
  }
  .day-header.has-film .day-name { color: var(--text); }
  .day-header .day-date {
    font-size: 12px;
    color: var(--muted);
  }
  .day-header.today .day-name { color: var(--accent); }
  .day-header.today .day-date { color: var(--accent); }

  .today-badge {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    background: var(--accent);
    color: var(--bg);
    padding: 2px 6px;
    border-radius: 4px;
  }

  .empty-day {
    padding: 10px 14px;
    color: var(--muted);
    font-size: 12px;
    font-style: italic;
    background: var(--bg);
  }

  .film-card {
    background: var(--surface2);
    padding: 12px 14px;
  }
  .film-card + .film-card {
    border-top: 1px solid var(--border);
  }
  .gap-indicator {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 14px;
    background: var(--surface2);
    border-top: 1px solid var(--border);
  }
  .gap-indicator .gap-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .film-title-row {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    margin-bottom: 8px;
  }
  .film-type-badge {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    padding: 3px 6px;
    border-radius: 4px;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .badge-new { background: rgba(74,222,128,0.15); color: var(--new); }
  .badge-rerelease { background: rgba(96,165,250,0.15); color: var(--rerelease); }
  .badge-event { background: rgba(232,196,90,0.15); color: var(--accent); }
  .badge-maxx { background: rgba(239,68,68,0.15); color: #ef4444; }

  .film-name {
    font-size: 15px;
    font-weight: 600;
    line-height: 1.3;
    color: var(--text);
  }

  .film-meta {
    display: flex;
    gap: 10px;
    align-items: center;
    margin-bottom: 8px;
    flex-wrap: wrap;
  }
  .film-time {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 1px;
    color: var(--accent);
  }
  .film-end {
    font-size: 12px;
    color: var(--muted);
  }
  .film-screen {
    font-size: 11px;
    color: var(--muted);
    background: var(--surface);
    padding: 2px 7px;
    border-radius: 4px;
    border: 1px solid var(--border);
  }

  .attendees-row {
    display: flex;
    gap: 6px;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 10px;
  }
  .attendee-chip {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 20px;
  }
  .chip-owen { background: rgba(167,139,250,0.2); color: var(--owen); }
  .chip-conor { background: rgba(52,211,153,0.2); color: var(--conor); }
  .chip-alice { background: rgba(244,114,182,0.2); color: var(--alice); }

  .book-btn {
    display: inline-block;
    background: var(--accent);
    color: var(--bg);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    padding: 7px 14px;
    border-radius: 6px;
    text-decoration: none;
    transition: opacity 0.2s;
    cursor: pointer;
    border: none;
  }
  .book-btn:hover { opacity: 0.85; }

  /* SECTION HEADERS */
  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 2px;
    color: var(--accent);
    margin-bottom: 12px;
    margin-top: 4px;
  }
  .section-count {
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 400;
    color: var(--muted);
    letter-spacing: 0;
    margin-left: 8px;
  }

  /* FUTURE FILMS LIST */
  .future-film-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 10px;
  }
  .future-film-card .film-name { margin-bottom: 6px; }
  .future-date-row {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }
  .date-chip {
    font-size: 11px;
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 3px 8px;
    border-radius: 5px;
    color: var(--muted);
  }
  .date-chip strong { color: var(--text); }
  .more-dates {
    font-size: 11px;
    color: var(--muted);
  }

  /* IMPOSSIBLE */
  .impossible-card {
    background: rgba(248,113,113,0.08);
    border: 1px solid rgba(248,113,113,0.3);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 10px;
  }
  .impossible-card .film-name { margin-bottom: 6px; }
  .reason-badge {
    font-size: 11px;
    font-weight: 600;
    color: var(--danger);
    background: rgba(248,113,113,0.12);
    padding: 3px 8px;
    border-radius: 5px;
    display: inline-block;
    margin-top: 4px;
  }

  /* KIDS */
  .kids-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .kids-icon { font-size: 18px; }
  .kids-name { font-size: 14px; font-weight: 500; color: var(--muted); }

  /* ALL SCREENINGS */
  .search-box {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    margin-bottom: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-box:focus { border-color: var(--accent); }
  .search-box::placeholder { color: var(--muted); }

  .film-group { margin-bottom: 16px; }
  .film-group-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    background: var(--surface);
    border-radius: 8px 8px 0 0;
    border: 1px solid var(--border);
    cursor: pointer;
  }
  .film-group-header .film-name { flex: 1; }
  .expand-icon { color: var(--muted); font-size: 12px; transition: transform 0.2s; }
  .film-group.open .expand-icon { transform: rotate(180deg); }

  .film-group-showings {
    display: none;
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 8px 8px;
    overflow: hidden;
  }
  .film-group.open .film-group-showings { display: block; }

  .showing-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .showing-row:last-child { border-bottom: none; }
  .showing-row.blocked { opacity: 0.4; }
  .showing-time {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 1px;
    color: var(--accent);
    min-width: 55px;
  }
  .showing-date {
    font-size: 12px;
    color: var(--text);
    min-width: 110px;
  }
  .showing-attendees { display: flex; gap: 4px; flex-wrap: wrap; }
  .showing-reason { font-size: 11px; color: var(--danger); }
  .showing-book {
    margin-left: auto;
    font-size: 11px;
    font-weight: 700;
    color: var(--accent);
    text-decoration: none;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 4px 10px;
    border: 1px solid var(--accent);
    border-radius: 5px;
    background: none;
    cursor: pointer;
  }

  /* LEGEND */
  .legend {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 16px;
    padding: 10px 12px;
    background: var(--surface);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

  .rules-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 12px;
  }
  .rules-card h3 { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 8px; }
  .rule-item { font-size: 12px; color: var(--text); padding: 3px 0; border-bottom: 1px solid var(--border); }
  .rule-item:last-child { border-bottom: none; }
  .rule-item span { color: var(--muted); }

  /* FILM COUNT */
  .count-row {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }
  .count-chip {
    font-size: 12px;
    font-weight: 600;
    padding: 5px 11px;
    border-radius: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
  }
  .count-chip strong { color: var(--accent); }

  .no-results { text-align: center; color: var(--muted); padding: 30px; font-size: 13px; }

  .note-box {
    background: rgba(232,196,90,0.08);
    border: 1px solid rgba(232,196,90,0.3);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 12px;
    color: var(--accent);
    margin-bottom: 12px;
    line-height: 1.5;
  }
</style>
</head>

// ========== HELPERS ==========
const _now = new Date();
const TODAY = `${_now.getFullYear()}-${String(_now.getMonth()+1).padStart(2,'0')}-${String(_now.getDate()).padStart(2,'0')}`;

function timeToMins(t) {
  const [h, m] = t.split(':').map(Number);
  return h * 60 + m;
}

function parseDateStr(s) {
  const [y,m,d] = s.split('-').map(Number);
  return new Date(y, m-1, d);
}

function formatDate(s) {
  const d = parseDateStr(s);
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${days[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]}`;
}

function formatFullDate(s) {
  const d = parseDateStr(s);
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  return `${days[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]}`;
}

function chipClass(name) {
  if (name === 'Owen') return 'chip-owen';
  if (name === 'Conor') return 'chip-conor';
  if (name === 'Alice') return 'chip-alice';
  return '';
}

function attendeeChips(names) {
  return names.map(n => `<span class="attendee-chip ${chipClass(n)}">${n}</span>`).join('');
}

function typeBadge(title, isRerelease, isMaxx) {
  const maxxBadge = isMaxx ? `<span class="film-type-badge badge-maxx">MAXX</span>` : '';
  if (title.includes('Cup') || title.includes('Semi-Final')) return `${maxxBadge}<span class="film-type-badge badge-event">EVENT</span>`;
  if (isRerelease) return `${maxxBadge}<span class="film-type-badge badge-rerelease">RE-RELEASE</span>`;
  return `${maxxBadge}<span class="film-type-badge badge-new">NEW</span>`;
}

function reasonLabel(r) {
  if (r === 'pub_quiz_thursday') return '🍺 Pub Quiz Thursday';
  if (r === 'sunday_too_early') return '🌅 Sunday — before 3pm';
  if (r === 'all_unavailable') return '❌ Everyone unavailable';
  return r;
}

function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  event.target.classList.add('active');
}

// ========== PAGE: CALENDAR ==========
function buildWeekPage() {
  const el = document.getElementById('page-week');

  // Build schedule map
  const schedMap = {};
  DATA.schedule.forEach(s => {
    const dt = s.showing.date;
    if (!schedMap[dt]) schedMap[dt] = [];
    schedMap[dt].push(s);
  });

  // Get all dates from today through the last scheduled date
  const todayDate = parseDateStr(TODAY);
  const scheduledDates = DATA.schedule.map(s => s.showing.date).sort();
  const lastDate = scheduledDates.length ? parseDateStr(scheduledDates[scheduledDates.length - 1]) : todayDate;

  // Build list of every date from today to lastDate
  const days = [];
  const cursor = new Date(todayDate);
  while (cursor <= lastDate) {
    const y = cursor.getFullYear();
    const m = String(cursor.getMonth()+1).padStart(2,'0');
    const d = String(cursor.getDate()).padStart(2,'0');
    days.push(`${y}-${m}-${d}`);
    cursor.setDate(cursor.getDate() + 1);
  }

  const dayNames = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const monthsFull = ['January','February','March','April','May','June','July','August','September','October','November','December'];

  let html = `
    <div class="week-header">
      <h2>CALENDAR</h2>
      <span class="subtitle">${DATA.schedule.length} films scheduled</span>
    </div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--owen)"></div> Owen</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--conor)"></div> Conor</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--alice)"></div> Alice</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--new)"></div> New Film</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--rerelease)"></div> Re-release</div>
    </div>
  `;

  const HOME_GAME_DATES = new Set([
    // Warriors (RL)
    '2026-02-21','2026-02-26','2026-03-13','2026-03-19','2026-03-28',
    '2026-04-19','2026-05-02','2026-05-15',
    '2026-07-10','2026-07-24','2026-08-08','2026-08-21','2026-08-27','2026-09-11',
    // Athletic (FC) — home games only, Matchday 46 is AWAY at Stevenage
    '2025-08-02','2025-08-12','2025-08-16','2025-08-26','2025-08-30',
    '2025-09-13','2025-09-23','2025-09-27','2025-10-11','2025-10-18',
    '2025-11-01','2025-11-29','2025-12-02','2025-12-06','2025-12-20',
    '2026-01-01','2026-01-17','2026-01-31','2026-02-10','2026-02-21',
    '2026-02-28','2026-03-14','2026-03-21','2026-04-11','2026-04-18',
  ]);

  // Availability blocks and notes per date
  const dayNotes = {
    '2026-05-07': ['⚠️ Conor unavailable'],
    '2026-05-09': ['🏉 Challenge Cup Semi-Final (away/neutral — Conor free)'],
    '2026-05-11': ['🎤 Maisie Peters gig — Conor & Alice unavailable'],
    '2026-05-12': ['🎉 Eurovision — everyone unavailable'],
    '2026-05-14': ['🎉 Eurovision — everyone unavailable'],
    '2026-05-15': ['🏉 Warriors vs Leeds Rhinos (home — no cinema)'],
    '2026-05-16': ['🎉 Eurovision — everyone unavailable'],
  };

  function getDayNotes(dateStr, dayName) {
    const notes = [...(dayNotes[dateStr] || [])];
    if (HOME_GAME_DATES.has(dateStr) && !notes.some(n => n.includes('no cinema'))) {
      notes.unshift('🏟️ Home match day — no cinema (Conor working)');
    }
    if (dayName === 'Sunday') notes.push('🕐 Owen working — films after 3pm only');
    if (['Monday','Tuesday','Wednesday','Thursday','Friday'].includes(dayName)) notes.push('🕐 Owen working — films after 7:35pm only');
    if (dayName === 'Thursday' && dateStr >= '2026-05-28') notes.push('🍺 Pub quiz — Conor & Owen unavailable');
    return notes;
  }

  let currentMonth = null;

  days.forEach(dateStr => {
    const d = parseDateStr(dateStr);
    const dayName = dayNames[d.getDay()];
    const films = schedMap[dateStr] || [];
    const isToday = dateStr === TODAY;
    const hasFilm = films.length > 0;
    const notes = getDayNotes(dateStr, dayName);

    // Month separator
    const month = d.getMonth();
    if (month !== currentMonth) {
      currentMonth = month;
      html += `<div style="font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:2px;color:var(--muted);padding:14px 2px 6px;border-bottom:1px solid var(--border);margin-bottom:10px;">${monthsFull[month].toUpperCase()} ${d.getFullYear()}</div>`;
    }

    html += `<div class="day-block ${hasFilm ? 'has-film' : ''}">`;
    html += `<div class="day-header ${hasFilm ? 'has-film' : ''} ${isToday ? 'today' : ''}">`;
    html += `<span class="day-name">${dayName.toUpperCase()}</span>`;
    html += `<div style="display:flex;gap:8px;align-items:center">`;
    if (isToday) html += `<span class="today-badge">TODAY</span>`;
    html += `<span class="day-date">${d.getDate()} ${monthNames[d.getMonth()]}</span>`;
    html += `</div></div>`;

    if (!hasFilm) {
      if (notes.length > 0) {
        notes.forEach(note => {
          html += `<div style="padding:5px 14px;font-size:12px;color:var(--muted);background:var(--surface2);border-top:1px solid var(--border)">${note}</div>`;
        });
      } else {
        html += `<div class="empty-day">—</div>`;
      }
    } else {
      if (notes.length > 0) {
        notes.forEach(note => {
          html += `<div style="padding:5px 14px;font-size:12px;color:var(--muted);background:var(--surface2);border-top:1px solid var(--border)">${note}</div>`;
        });
      }
      const sorted = [...films].sort((a, b) => a.showing.start.localeCompare(b.showing.start));
      sorted.forEach((f, i) => {
        const s = f.showing;
        html += `<div class="film-card">`;
        html += `<div class="film-title-row">${typeBadge(f.title, f.is_rerelease, s.is_maxx)}<span class="film-name">${f.title}</span></div>`;
        html += `<div class="film-meta">`;
        html += `<span class="film-time">${s.start}</span>`;
        html += `<span class="film-end">ends ${s.end}</span>`;
        html += `<span class="film-screen">${s.screen}</span>`;
        html += `</div>`;
        html += `<div class="attendees-row">${attendeeChips(s.attendees)}</div>`;
        html += `</div>`;

        if (i < sorted.length - 1) {
          const endMins = timeToMins(s.end);
          const nextStartMins = timeToMins(sorted[i+1].showing.start);
          const gap = nextStartMins - endMins;
          if (gap >= 0) {
            const hrs = Math.floor(gap / 60);
            const mins = gap % 60;
            const gapStr = hrs > 0 ? `${hrs}h ${mins}m` : `${mins}m`;
            const gapColour = gap < 30 ? 'var(--danger)' : gap < 90 ? 'var(--accent)' : 'var(--muted)';
            html += `<div class="gap-indicator">`;
            html += `<div class="gap-line"></div>`;
            html += `<span style="font-size:11px;font-weight:600;color:${gapColour};white-space:nowrap">⏱ ${gapStr} gap</span>`;
            html += `<div class="gap-line"></div>`;
            html += `</div>`;
          }
        }
      });
    }

    html += `</div>`;
  });

  el.innerHTML = html;
}

// ========== PAGE: FUTURE ==========
function buildFuturePage() {
  const el = document.getElementById('page-future');
  const todayDate = parseDateStr(TODAY);

  // Get all films with watchable showings beyond this week
  const sevenDaysLater = new Date(todayDate);
  sevenDaysLater.setDate(sevenDaysLater.getDate() + 7);
  const cutoff = `${sevenDaysLater.getFullYear()}-${String(sevenDaysLater.getMonth()+1).padStart(2,'0')}-${String(sevenDaysLater.getDate()).padStart(2,'0')}`;

  // Find all films with future watchable showings
  const futureFilms = [];
  DATA.all_films.forEach(film => {
    const futureShowings = film.showings.filter(s => !s.blocked && s.date >= cutoff);
    if (futureShowings.length > 0) {
      futureFilms.push({ ...film, futureShowings });
    }
  });

  // Also find scheduled items beyond this week
  const futureScheduled = DATA.schedule.filter(s => s.showing.date >= cutoff);
  const scheduledMap = {};
  futureScheduled.forEach(s => { scheduledMap[s.title] = s; });

  futureFilms.sort((a, b) => {
    const ad = a.futureShowings[0]?.date || '9999';
    const bd = b.futureShowings[0]?.date || '9999';
    return ad.localeCompare(bd);
  });

  const newFuture = futureFilms.filter(f => !f.is_rerelease);
  const reFuture = futureFilms.filter(f => f.is_rerelease);

  function renderGroup(films, label) {
    if (films.length === 0) return '';
    let html = `<div class="section-title">${label}<span class="section-count">${films.length} films</span></div>`;
    films.forEach(film => {
      const scheduled = scheduledMap[film.title];
      const topShowings = film.futureShowings.slice(0, 4);
      html += `<div class="future-film-card">`;
      html += `<div class="film-title-row">${typeBadge(film.title, film.is_rerelease, scheduled ? scheduled.showing.is_maxx : film.futureShowings[0]?.is_maxx)}<span class="film-name">${film.title}</span></div>`;
      if (scheduled) {
        html += `<div style="margin-bottom:8px;padding:6px 10px;background:rgba(232,196,90,0.1);border-radius:6px;border:1px solid rgba(232,196,90,0.3);font-size:12px;color:var(--accent)">`;
        html += `📅 Scheduled: ${formatDate(scheduled.showing.date)} at ${scheduled.showing.start} — ${attendeeChips(scheduled.showing.attendees)}</div>`;
      }
      html += `<div class="future-date-row">`;
      topShowings.forEach(s => {
        html += `<span class="date-chip"><strong>${formatDate(s.date)}</strong> ${s.start}</span>`;
      });
      if (film.futureShowings.length > 4) {
        html += `<span class="more-dates">+${film.futureShowings.length - 4} more</span>`;
      }
      html += `</div></div>`;
    });
    return html;
  }

  let html = `<div class="week-header"><h2>COMING UP</h2><span class="subtitle">Beyond next 7 days</span></div>`;

  if (futureFilms.length === 0) {
    html += `<div class="no-results">No upcoming scheduled screenings beyond this week.</div>`;
  } else {
    html += renderGroup(newFuture, 'NEW FILMS');
    html += renderGroup(reFuture, 'RE-RELEASES & EVENTS');
  }

  el.innerHTML = html;
}

// ========== PAGE: ALL SCREENINGS ==========
function buildScreeningsPage() {
  const el = document.getElementById('page-screenings');

  const newFilms = DATA.all_films.filter(f => !f.is_rerelease);
  const reFilms = DATA.all_films.filter(f => f.is_rerelease);

  function renderFilmGroup(film) {
    const watchableCount = film.showings.filter(s => !s.blocked).length;
    const id = 'fg_' + film.title.replace(/[^a-z0-9]/gi, '');
    let html = `<div class="film-group" id="${id}">`;
    html += `<div class="film-group-header" onclick="toggleGroup('${id}')">`;
    html += typeBadge(film.title, film.is_rerelease, film.showings.some(s => s.is_maxx));
    html += `<span class="film-name">${film.title}</span>`;
    html += `<span style="font-size:11px;color:var(--muted)">${watchableCount} watchable</span>`;
    html += `<span class="expand-icon">▼</span>`;
    html += `</div>`;
    html += `<div class="film-group-showings">`;
    film.showings.forEach(s => {
      const blocked = s.blocked;
      html += `<div class="showing-row ${blocked ? 'blocked' : ''}">`;
      html += `<span class="showing-time">${s.start}</span>`;
      html += `<span class="showing-date">${formatDate(s.date)}</span>`;
      if (s.is_maxx) html += `<span class="film-type-badge badge-maxx" style="font-size:9px;padding:2px 5px">MAXX</span>`;
      if (!blocked) {
        html += `<div class="showing-attendees">${attendeeChips(s.attendees)}</div>`;
      } else {
        html += `<span class="showing-reason">${s.reasons.map(reasonLabel).join(' · ')}</span>`;
      }
      html += `</div>`;
    });
    html += `</div></div>`;
    return html;
  }

  let html = `<div class="week-header"><h2>ALL SCREENINGS</h2><span class="subtitle">Every available showing</span></div>`;
  html += `<input class="search-box" type="text" placeholder="Search films..." oninput="filterScreenings(this.value)" id="screenSearch">`;
  html += `<div class="count-row">`;
  html += `<span class="count-chip"><strong>${DATA.all_films.length}</strong> films</span>`;
  const totalWatchable = DATA.all_films.reduce((a,f) => a + f.showings.filter(s=>!s.blocked).length, 0);
  html += `<span class="count-chip"><strong>${totalWatchable}</strong> watchable showings</span>`;
  html += `</div>`;
  html += `<div id="screenings-list">`;
  html += `<div class="section-title">NEW FILMS<span class="section-count">${newFilms.length}</span></div>`;
  newFilms.forEach(f => { html += renderFilmGroup(f); });
  html += `<div class="section-title" style="margin-top:16px">RE-RELEASES & EVENTS<span class="section-count">${reFilms.length}</span></div>`;
  reFilms.forEach(f => { html += renderFilmGroup(f); });
  html += `</div>`;

  el.innerHTML = html;
}

function toggleGroup(id) {
  const el = document.getElementById(id);
  el.classList.toggle('open');
}

function filterScreenings(val) {
  const v = val.toLowerCase();
  document.querySelectorAll('#screenings-list .film-group').forEach(g => {
    const title = g.querySelector('.film-name').textContent.toLowerCase();
    g.style.display = title.includes(v) ? '' : 'none';
  });
}

// ========== PAGE: IMPOSSIBLE ==========
function buildImpossiblePage() {
  const el = document.getElementById('page-impossible');
  let html = `<div class="week-header"><h2>CAN'T WATCH</h2><span class="subtitle">Films with no viable screenings</span></div>`;

  // Partial group section
  if (DATA.partial_group && DATA.partial_group.length > 0) {
    html += `<div class="section-title">PARTIAL GROUP<span class="section-count">${DATA.partial_group.length} films</span></div>`;
    html += `<div style="font-size:12px;color:var(--muted);margin-bottom:12px;">These films can't be watched by all three of you together — shown here with who CAN attend.</div>`;

    DATA.partial_group.forEach(film => {
      const s = film.showing;
      const attendees = s.attendees || [];
      html += `<div class="impossible-card" style="border-color:rgba(232,196,90,0.3);background:rgba(232,196,90,0.05);">`;
      html += `<div class="film-title-row">${typeBadge(film.title, film.is_rerelease, s.is_maxx)}<span class="film-name">${film.title}</span></div>`;
      html += `<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:8px">`;
      html += `<span style="font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--accent)">${s.start}</span>`;
      html += `<span style="font-size:12px;color:var(--muted)">ends ${s.end}</span>`;
      html += `<span class="film-screen">${s.screen}</span>`;
      html += `<span style="font-size:12px;color:var(--muted)">${formatDate(s.date)}</span>`;
      html += `</div>`;
      html += `<div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px">Can attend:</div>`;
      html += `<div class="attendees-row">${attendeeChips(attendees)}</div>`;
      if (film.note) {
        html += `<div style="font-size:11px;color:var(--accent);margin-top:6px;padding:5px 8px;background:rgba(232,196,90,0.1);border-radius:5px">ℹ️ ${film.note}</div>`;
      }
      html += `</div>`;
    });
  }

  // Truly impossible section
  if (DATA.impossible_films.length > 0) {
    html += `<div class="section-title" style="margin-top:${DATA.partial_group?.length ? '20px' : '0'}">NO VIABLE SCREENINGS<span class="section-count">${DATA.impossible_films.length} films</span></div>`;
    DATA.impossible_films.forEach(film => {
      html += `<div class="impossible-card">`;
      html += `<div class="film-title-row">${typeBadge(film.title, film.is_rerelease, film.showings.some(s => s.is_maxx))}<span class="film-name">${film.title}</span></div>`;
      const reasons = [...new Set(film.showings.flatMap(s => s.reasons))];
      reasons.forEach(r => { html += `<span class="reason-badge">${reasonLabel(r)}</span> `; });
      html += `<div style="margin-top:8px;font-size:12px;color:var(--muted)">Available showings:</div>`;
      film.showings.forEach(s => {
        html += `<div style="font-size:12px;padding:3px 0;color:var(--muted)">${formatDate(s.date)} at ${s.start}</div>`;
      });
      html += `</div>`;
    });
  }

  if (!DATA.impossible_films.length && !DATA.partial_group?.length) {
    html += `<div class="no-results">No impossible films — great scheduling!</div>`;
  }

  html += `<div class="section-title" style="margin-top:20px">SCHEDULING RULES<span class="section-count">active</span></div>`;
  html += `<div class="rules-card"><h3>Current Rules</h3>`;
  const rules = [
    ['All three must attend', 'Films are only scheduled if Owen, Conor & Alice can all make it'],
    ['Weekday evenings', 'Films must start at 7:35pm or later (Owen at work)'],
    ['Sunday', 'Films must start after 3:00pm (Owen at work)'],
    ['Thursday from 28 May', 'No Thursday evenings (pub quiz — Owen & Conor)'],
    ['Home games', 'No films when Wigan Warriors or Athletic play at home (Conor works)'],
    ['Children\'s films', 'Excluded unless in priority list'],
    ['Priority', 'New films scheduled before re-releases & anniversaries'],
  ];
  rules.forEach(([label, detail]) => {
    html += `<div class="rule-item"><strong>${label}:</strong> <span>${detail}</span></div>`;
  });
  html += `</div>`;

  el.innerHTML = html;
}

// Overlap guard — used during schedule building to reject clashing slots
function hasOverlap(dateStr, startStr, endStr) {
  const start = timeToMins(startStr);
  const end = timeToMins(endStr);
  return DATA.schedule.some(s =>
    s.showing.date === dateStr &&
    timeToMins(s.showing.start) < end &&
    timeToMins(s.showing.end) > start
  );
}

// ========== PAGE: FIXTURES ==========
function buildFixturesPage() {
  const el = document.getElementById('page-fixtures');
  const todayStr = TODAY;

  function renderFixture(f) {
    const isPast = f.date < todayStr;
    const isToday = f.date === todayStr;
    const isRL = f.sport === 'rl';
    const accentColor = isRL ? 'var(--accent2)' : '#38bdf8';
    const sportEmoji = isRL ? '🏉' : '⚽';
    const teamName = isRL ? 'Wigan Warriors' : 'Wigan Athletic';

    let borderColor = isPast ? 'var(--border)' : accentColor;
    if (isToday) borderColor = 'var(--danger)';

    let html = `<div style="background:var(--surface);border:1px solid ${borderColor};border-radius:10px;padding:12px 14px;margin-bottom:10px;">`;

    html += `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">`;
    html += `<span style="font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;color:${isPast ? 'var(--muted)' : 'var(--text)'}">`;
    html += `${formatDate(f.date)}`;
    if (isToday) html += ` <span style="font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;background:var(--danger);color:var(--bg);padding:2px 6px;border-radius:4px;margin-left:6px">TODAY</span>`;
    html += `</span>`;
    html += `<span style="font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;color:${isPast ? 'var(--muted)' : accentColor}">${f.time}</span>`;
    html += `</div>`;

    html += `<div style="font-size:15px;font-weight:600;color:${isPast ? 'var(--muted)' : 'var(--text)'};margin-bottom:6px">${sportEmoji} ${teamName} vs ${f.opponent}</div>`;

    html += `<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:${!isPast ? '8px' : '0'}">`;
    html += `<span style="font-size:11px;font-weight:600;padding:3px 8px;border-radius:4px;background:${isRL ? 'rgba(96,165,250,0.15)' : 'rgba(56,189,248,0.15)'};color:${accentColor}">${f.competition}</span>`;
    html += `<span style="font-size:11px;color:var(--muted);background:var(--surface2);padding:3px 8px;border-radius:4px;border:1px solid var(--border)">${f.round}</span>`;
    if (f.result) {
      const won = f.result.startsWith('W');
      const drew = f.result.startsWith('D');
      const col = won ? 'var(--new)' : drew ? 'var(--accent)' : 'var(--danger)';
      const bg = won ? 'rgba(74,222,128,0.15)' : drew ? 'rgba(232,196,90,0.15)' : 'rgba(248,113,113,0.15)';
      html += `<span style="font-size:11px;font-weight:700;padding:3px 8px;border-radius:4px;background:${bg};color:${col}">${f.result}</span>`;
    }
    html += `</div>`;

    if (!isPast) {
      html += `<div style="display:flex;align-items:center;gap:6px;padding:6px 10px;background:rgba(52,211,153,0.08);border:1px solid rgba(52,211,153,0.2);border-radius:6px;font-size:12px;color:var(--conor)">`;
      html += `⚠️ Conor working — no cinema this day</div>`;
    }

    html += `</div>`;
    return html;
  }

  const allSorted = [...HOME_FIXTURES].sort((a,b) => a.date.localeCompare(b.date));
  const upcoming = allSorted.filter(f => f.date >= todayStr);
  const past = allSorted.filter(f => f.date < todayStr);
  const upcomingRL = upcoming.filter(f => f.sport === 'rl');
  const upcomingFC = upcoming.filter(f => f.sport === 'fc');
  const pastRL = past.filter(f => f.sport === 'rl');
  const pastFC = past.filter(f => f.sport === 'fc');

  let html = `<div class="week-header"><h2>HOME FIXTURES</h2><span class="subtitle">Brick Community Stadium</span></div>`;
  html += `<div class="note-box">All home games at The Brick Community Stadium — Conor works all match days. Sources: wiganwarriors.com & Wikipedia (fixtures subject to change).</div>`;

  // Filter buttons
  html += `<div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">`;
  html += `<button onclick="filterFixtures('all')" id="fix-all" style="font-size:12px;font-weight:700;padding:6px 14px;border-radius:20px;background:var(--accent);color:var(--bg);border:none;cursor:pointer">All (${upcoming.length})</button>`;
  html += `<button onclick="filterFixtures('rl')" id="fix-rl" style="font-size:12px;font-weight:700;padding:6px 14px;border-radius:20px;background:var(--surface2);color:var(--muted);border:1px solid var(--border);cursor:pointer">🏉 Warriors (${upcomingRL.length})</button>`;
  html += `<button onclick="filterFixtures('fc')" id="fix-fc" style="font-size:12px;font-weight:700;padding:6px 14px;border-radius:20px;background:var(--surface2);color:var(--muted);border:1px solid var(--border);cursor:pointer">⚽ Athletic (${upcomingFC.length})</button>`;
  html += `</div>`;

  html += `<div id="fix-upcoming">`;
  if (upcoming.length > 0) {
    html += `<div class="section-title">UPCOMING<span class="section-count">${upcoming.length} games</span></div>`;
    upcoming.forEach(f => { html += `<div class="fix-item" data-sport="${f.sport}">${renderFixture(f)}</div>`; });
  } else {
    html += `<div class="no-results">No more home fixtures this season.</div>`;
  }
  html += `</div>`;

  if (past.length > 0) {
    html += `<div id="fix-past">`;
    html += `<div class="section-title" style="margin-top:16px">PLAYED<span class="section-count">${past.length} games</span></div>`;
    past.forEach(f => { html += `<div class="fix-item" data-sport="${f.sport}">${renderFixture(f)}</div>`; });
    html += `</div>`;
  }

  el.innerHTML = html;
}

function filterFixtures(sport) {
  document.querySelectorAll('.fix-item').forEach(el => {
    el.style.display = (sport === 'all' || el.dataset.sport === sport) ? '' : 'none';
  });
  ['all','rl','fc'].forEach(s => {
    const btn = document.getElementById('fix-' + s);
    if (btn) {
      btn.style.background = s === sport ? 'var(--accent)' : 'var(--surface2)';
      btn.style.color = s === sport ? 'var(--bg)' : 'var(--muted)';
      btn.style.border = s === sport ? 'none' : '1px solid var(--border)';
    }
  });
}
