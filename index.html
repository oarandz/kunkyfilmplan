<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>🎬 Omniplex Wigan — Film Schedule</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap');
  /* Fallback stack ensures readable text even if Google Fonts is unavailable */

  :root {
    --bg: #0d0d0f;
    --surface: #16171a;
    --surface2: #1e2024;
    --border: #2a2d34;
    --accent: #e8c45a;
    --accent2: #e06a3f;
    --new: #4ade80;
    --rerelease: #60a5fa;
    --text: #e8e9ec;
    --muted: #7a7d88;
    --danger: #f87171;
    --owen: #a78bfa;
    --conor: #34d399;
    --alice: #f472b6;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* TOP NAV */
  .top-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px 0;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .top-bar h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    color: var(--accent);
    line-height: 1;
    margin-bottom: 12px;
  }
  .top-bar h1 span { color: var(--text); opacity: 0.5; }

  .tab-row {
    display: flex;
    gap: 0;
    overflow-x: auto;
    scrollbar-width: none;
    -ms-overflow-style: none;
  }
  .tab-row::-webkit-scrollbar { display: none; }

  .tab {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--muted);
    padding: 8px 14px;
    border: none;
    background: none;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: color 0.2s, border-color 0.2s;
  }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab:hover:not(.active) { color: var(--text); }

  /* CONTENT */
  .page { display: none; padding: 16px; }
  .page.active { display: block; }

  /* WEEK HEADER */
  .week-header {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 16px;
  }
  .week-header h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 2px;
    color: var(--accent);
  }
  .week-header .subtitle {
    font-size: 12px;
    color: var(--muted);
  }

  /* DAY BLOCK */
  .day-block {
    margin-bottom: 12px;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .day-block.has-film { border-color: var(--accent); }

  .day-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 14px;
    background: var(--surface);
  }
  .day-header .day-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 1px;
    color: var(--muted);
  }
  .day-header.has-film .day-name { color: var(--text); }
  .day-header .day-date {
    font-size: 12px;
    color: var(--muted);
  }
  .day-header.today .day-name { color: var(--accent); }
  .day-header.today .day-date { color: var(--accent); }

  .today-badge {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    background: var(--accent);
    color: var(--bg);
    padding: 2px 6px;
    border-radius: 4px;
  }

  .empty-day {
    padding: 10px 14px;
    color: var(--muted);
    font-size: 12px;
    font-style: italic;
    background: var(--bg);
  }

  .film-card {
    background: var(--surface2);
    padding: 12px 14px;
  }
  .film-card + .film-card {
    border-top: 1px solid var(--border);
  }
  .gap-indicator {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 14px;
    background: var(--surface2);
    border-top: 1px solid var(--border);
  }
  .gap-indicator .gap-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .film-title-row {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    margin-bottom: 8px;
  }
  .film-type-badge {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    padding: 3px 6px;
    border-radius: 4px;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .badge-new { background: rgba(74,222,128,0.15); color: var(--new); }
  .badge-rerelease { background: rgba(96,165,250,0.15); color: var(--rerelease); }
  .badge-event { background: rgba(232,196,90,0.15); color: var(--accent); }
  .badge-maxx { background: rgba(239,68,68,0.15); color: #ef4444; }

  .rating-badge {
    font-size: 10px;
    font-weight: 800;
    padding: 2px 6px;
    border-radius: 4px;
    flex-shrink: 0;
    margin-top: 2px;
    letter-spacing: 0.5px;
    border: 1.5px solid;
  }
  .rating-U    { color: #4ade80; border-color: #4ade80; background: rgba(74,222,128,0.1); }
  .rating-PG   { color: #facc15; border-color: #facc15; background: rgba(250,204,21,0.1); }
  .rating-12A  { color: #fb923c; border-color: #fb923c; background: rgba(251,146,60,0.1); }
  .rating-15   { color: #f87171; border-color: #f87171; background: rgba(248,113,113,0.1); }
  .rating-18   { color: #dc2626; border-color: #dc2626; background: rgba(220,38,38,0.1); }

  .genre-chip {
    font-size: 10px;
    font-weight: 500;
    color: var(--muted);
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 2px 6px;
    border-radius: 20px;
  }

  .film-name {
    font-size: 15px;
    font-weight: 600;
    line-height: 1.3;
    color: var(--text);
  }

  .film-meta {
    display: flex;
    gap: 10px;
    align-items: center;
    margin-bottom: 8px;
    flex-wrap: wrap;
  }
  .film-time {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 1px;
    color: var(--accent);
  }
  .film-end {
    font-size: 12px;
    color: var(--muted);
  }
  .film-screen {
    font-size: 11px;
    color: var(--muted);
    background: var(--surface);
    padding: 2px 7px;
    border-radius: 4px;
    border: 1px solid var(--border);
  }

  .attendees-row {
    display: flex;
    gap: 6px;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 10px;
  }
  .attendee-chip {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 20px;
  }
  .chip-owen { background: rgba(167,139,250,0.2); color: var(--owen); }
  .chip-conor { background: rgba(52,211,153,0.2); color: var(--conor); }
  .chip-alice { background: rgba(244,114,182,0.2); color: var(--alice); }

  .book-btn {
    display: inline-block;
    background: var(--accent);
    color: var(--bg);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    padding: 7px 14px;
    border-radius: 6px;
    text-decoration: none;
    transition: opacity 0.2s;
    cursor: pointer;
    border: none;
  }
  .book-btn:hover { opacity: 0.85; }

  /* SECTION HEADERS */
  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 2px;
    color: var(--accent);
    margin-bottom: 12px;
    margin-top: 4px;
  }
  .section-count {
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 400;
    color: var(--muted);
    letter-spacing: 0;
    margin-left: 8px;
  }

  /* FUTURE FILMS LIST */
  .future-film-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 10px;
  }
  .future-film-card .film-name { margin-bottom: 6px; }
  .future-date-row {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }
  .date-chip {
    font-size: 11px;
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 3px 8px;
    border-radius: 5px;
    color: var(--muted);
  }
  .date-chip strong { color: var(--text); }
  .more-dates {
    font-size: 11px;
    color: var(--muted);
  }

  /* IMPOSSIBLE */
  .impossible-card {
    background: rgba(248,113,113,0.08);
    border: 1px solid rgba(248,113,113,0.3);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 10px;
  }
  .impossible-card .film-name { margin-bottom: 6px; }
  .reason-badge {
    font-size: 11px;
    font-weight: 600;
    color: var(--danger);
    background: rgba(248,113,113,0.12);
    padding: 3px 8px;
    border-radius: 5px;
    display: inline-block;
    margin-top: 4px;
  }

  /* KIDS */
  .kids-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .kids-icon { font-size: 18px; }
  .kids-name { font-size: 14px; font-weight: 500; color: var(--muted); }

  /* ALL SCREENINGS */
  .search-box {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    margin-bottom: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-box:focus { border-color: var(--accent); }
  .search-box::placeholder { color: var(--muted); }

  .film-group { margin-bottom: 16px; }
  .film-group-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    background: var(--surface);
    border-radius: 8px 8px 0 0;
    border: 1px solid var(--border);
    cursor: pointer;
  }
  .film-group-header .film-name { flex: 1; }
  .expand-icon { color: var(--muted); font-size: 12px; transition: transform 0.2s; }
  .film-group.open .expand-icon { transform: rotate(180deg); }

  .film-group-showings {
    display: none;
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 8px 8px;
    overflow: hidden;
  }
  .film-group.open .film-group-showings { display: block; }

  .showing-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .showing-row:last-child { border-bottom: none; }
  .showing-row.blocked { opacity: 0.4; }
  .showing-time {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 1px;
    color: var(--accent);
    min-width: 55px;
  }
  .showing-date {
    font-size: 12px;
    color: var(--text);
    min-width: 110px;
  }
  .showing-attendees { display: flex; gap: 4px; flex-wrap: wrap; }
  .showing-reason { font-size: 11px; color: var(--danger); }
  .showing-book {
    margin-left: auto;
    font-size: 11px;
    font-weight: 700;
    color: var(--accent);
    text-decoration: none;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 4px 10px;
    border: 1px solid var(--accent);
    border-radius: 5px;
    background: none;
    cursor: pointer;
  }

  /* LEGEND */
  .legend {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 16px;
    padding: 10px 12px;
    background: var(--surface);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

  .rules-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 12px;
  }
  .rules-card h3 { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 8px; }
  .rule-item { font-size: 12px; color: var(--text); padding: 3px 0; border-bottom: 1px solid var(--border); }
  .rule-item:last-child { border-bottom: none; }
  .rule-item span { color: var(--muted); }

  /* FILM COUNT */
  .count-row {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }
  .count-chip {
    font-size: 12px;
    font-weight: 600;
    padding: 5px 11px;
    border-radius: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
  }
  .count-chip strong { color: var(--accent); }

  .avail-btn {
    display: inline-block;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--bg);
    background: var(--accent);
    padding: 5px 12px;
    border-radius: 5px;
    text-decoration: none;
    border: none;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .avail-btn:hover { opacity: 0.85; }

  .note-box {
    background: rgba(232,196,90,0.08);
    border: 1px solid rgba(232,196,90,0.3);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 12px;
    color: var(--accent);
    margin-bottom: 12px;
    line-height: 1.5;
  }
</style>
</head>

  </div>
</div>

<div id="page-screenings" class="page"></div>

<div id="page-stats" class="page"></div>
<div id="page-reviews" class="page"></div>

// ========== HELPERS ==========
const _now = new Date();
const TODAY = `${_now.getFullYear()}-${String(_now.getMonth()+1).padStart(2,'0')}-${String(_now.getDate()).padStart(2,'0')}`;

function availBtn(url) {
  if (!url) return '';
  return `<a href="${url}" target="_blank" class="avail-btn">Show Availability</a>`;
}

function ratingBadge(rating) {
  if (!rating) return '';
  const cls = 'rating-' + rating.replace('A','A');
  return `<span class="rating-badge ${cls}">${rating}</span>`;
}

function genreChips(genres) {
  if (!genres || !genres.length) return '';
  return genres.map(g => `<span class="genre-chip">${g}</span>`).join('');
}

function timeToMins(t) {
  const [h, m] = t.split(':').map(Number);
  return h * 60 + m;
}

function parseDateStr(s) {
  const [y,m,d] = s.split('-').map(Number);
  return new Date(y, m-1, d);
}

function formatDate(s) {
  const d = parseDateStr(s);
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${days[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]}`;
}

function formatFullDate(s) {
  const d = parseDateStr(s);
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  return `${days[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]}`;
}

function chipClass(name) {
  if (name === 'Owen') return 'chip-owen';
  if (name === 'Conor') return 'chip-conor';
  if (name === 'Alice') return 'chip-alice';
  return '';
}

function attendeeChips(names) {
  return names.map(n => `<span class="attendee-chip ${chipClass(n)}">${n}</span>`).join('');
}

function typeBadge(title, isRerelease, isMaxx, isEstimated) {
  const maxxBadge = isMaxx ? `<span class="film-type-badge badge-maxx">MAXX</span>` : '';
  const estBadge = isEstimated ? `<span class="film-type-badge" style="background:rgba(251,146,60,0.15);color:#fb923c;border:1px solid rgba(251,146,60,0.3);">~EST</span>` : '';
  if (title.includes('Cup') || title.includes('Semi-Final')) return `${maxxBadge}${estBadge}<span class="film-type-badge badge-event">EVENT</span>`;
  if (isRerelease) return `${maxxBadge}${estBadge}<span class="film-type-badge badge-rerelease">RE-RELEASE</span>`;
  return `${maxxBadge}${estBadge}<span class="film-type-badge badge-new">NEW</span>`;
}

function reasonLabel(r) {
  if (r === 'pub_quiz_thursday') return '🍺 Pub Quiz Thursday';
  if (r === 'sunday_too_early') return '🌅 Sunday — before 3pm';
  if (r === 'all_unavailable') return '❌ Everyone unavailable';
  return r;
}

function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  event.target.classList.add('active');
}

// ========== PAGE: CALENDAR ==========
// Observed start time data: {advertised: actual} offsets in minutes
// Built from Start_Times.txt — grows each visit
const OBSERVED_OFFSETS = [15, 15, 15, 19, 15, 16, 15, 14, 10, 18]; // MK2:+15, Obsession:+15, Passenger:+15, StarWars:+19, Backrooms:+15, PowerBallad:+16, Masters:+15, Tuner:+14, ScaryMovie:+10, DisclosureDay:+18
// Use mean of observed offsets. Falls back to 15 if no data.
const PRE_SHOW_MINS = OBSERVED_OFFSETS.length > 0
  ? Math.round(OBSERVED_OFFSETS.reduce((a,b) => a+b, 0) / OBSERVED_OFFSETS.length)
  : 15;

function buildWeekPage() {
  const el = document.getElementById('page-week');

  // Build schedule map
  const schedMap = {};
  DATA.schedule.forEach(s => {
    const dt = s.showing.date;
    if (!schedMap[dt]) schedMap[dt] = [];
    schedMap[dt].push(s);
  });

  // Get all dates from today through the last scheduled date
  const todayDate = parseDateStr(TODAY);
  const scheduledDates = DATA.schedule.map(s => s.showing.date).sort();
  const lastDate = scheduledDates.length ? parseDateStr(scheduledDates[scheduledDates.length - 1]) : todayDate;

  // Build list of every date from today to lastDate
  const days = [];
  const cursor = new Date(todayDate);
  while (cursor <= lastDate) {
    const y = cursor.getFullYear();
    const m = String(cursor.getMonth()+1).padStart(2,'0');
    const d = String(cursor.getDate()).padStart(2,'0');
    days.push(`${y}-${m}-${d}`);
    cursor.setDate(cursor.getDate() + 1);
  }

  const dayNames = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const monthsFull = ['January','February','March','April','May','June','July','August','September','October','November','December'];

  let html = `
    <div class="week-header">
      <h2>CALENDAR</h2>
      <span class="subtitle">${DATA.schedule.length} films scheduled</span>
    </div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--new)"></div> New Film</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--rerelease)"></div> Re-release</div>
    </div>
  `;

  // Build a map of showing timings for countdown logic
  // Key insight: slot end time IS film end time (Omniplex lists actual end, not including cleanup)
  // Film start = slot start + pre-show buffer
  // Pre-show buffer = slot duration - film runtime
  // Since we don't always have runtime, use slot duration as a proxy
  // (Omniplex pads ~20min of ads before the listed start, the listed end is the actual film end)
  // So: film start = slot start + 20min, film end = slot end (no further adjustment needed)

  function showingMs(dateStr, timeStr) {
    const d = parseDateStr(dateStr);
    const [h, m] = timeStr.split(':').map(Number);
    d.setHours(h, m, 0, 0);
    return d.getTime();
  }

  // Classify each scheduled film's status relative to now
  function getFilmStatus(showing) {
    const now = Date.now();
    const slotStartMs = showingMs(showing.date, showing.start);
    const filmStartMs = slotStartMs + PRE_SHOW_MINS * 60000;
    const filmEndMs = showingMs(showing.date, showing.end);
    if (now < filmStartMs) return { state: now < slotStartMs ? 'upcoming' : 'ads', targetMs: filmStartMs, label: 'film starts' };
    if (now >= filmStartMs && now < filmEndMs) return { state: 'showing', targetMs: filmEndMs, label: 'ends' };
    return { state: 'finished', targetMs: null, label: null };
  }

  // Find the "active" film: currently showing or next upcoming
  let activeCdId = null;
  const now = Date.now();
  const allShowings = DATA.schedule.map(s => ({
    title: s.title, showing: s.showing,
    slotStartMs: showingMs(s.showing.date, s.showing.start),
    filmStartMs: showingMs(s.showing.date, s.showing.start) + PRE_SHOW_MINS * 60000,
    filmEndMs: showingMs(s.showing.date, s.showing.end),
  })).sort((a,b) => a.slotStartMs - b.slotStartMs);

  // Active = currently showing, or if none, the next upcoming
  // Active = counting down to film start (until that moment passes), then counting down to end
  let activeShowing = allShowings.find(s => now < s.filmStartMs && now >= s.slotStartMs - 86400000 * 7 && s.filmEndMs > now);
  // Narrow: either we haven't reached film start yet (count to start), or we're mid-film (count to end)
  // Priority: not-yet-started upcoming > currently showing
  const nextUpcoming = allShowings.find(s => s.filmStartMs > now && s.filmEndMs > now);
  const currentlyShowing = allShowings.find(s => now >= s.filmStartMs && now < s.filmEndMs);
  // Show countdown to start for next film unless a film is actively showing
  activeShowing = currentlyShowing || nextUpcoming || null;

  if (activeShowing) {
    activeCdId = 'cd_' + activeShowing.showing.date + '_' + activeShowing.showing.start.replace(':','');
  }

  const HOME_GAME_DATES = new Set([
    // Warriors (RL)
    '2026-02-21','2026-02-26','2026-03-13','2026-03-19','2026-03-28',
    '2026-04-19','2026-05-02','2026-05-15',
    '2026-07-10','2026-07-24','2026-08-08','2026-08-21','2026-08-27','2026-09-11',
    // Athletic (FC) — confirmed home games only
    '2025-08-02','2025-08-12','2025-08-16','2025-08-26','2025-08-30',
    '2025-09-13','2025-09-23','2025-09-27','2025-10-11','2025-10-18',
    '2025-11-01','2025-11-29','2025-12-02','2025-12-06','2025-12-20',
    '2026-01-01','2026-01-17','2026-01-31','2026-02-10','2026-02-21',
    '2026-02-28','2026-03-14','2026-03-21','2026-04-11','2026-04-18',
  ]);

  const BANK_HOLIDAYS_RELAXED = new Set(['2026-05-25']);

  const dayNotes = {
    '2026-05-07': ['🎤 Baby No Money gig — Conor & Alice unavailable'],
    '2026-05-09': ['🎤 Mr Gey Gig — Conor & Alice unavailable'],
    '2026-05-10': ['❌ Everyone unavailable'],
    '2026-05-11': ['🎤 Maisie Peters gig — Conor & Alice unavailable'],
    '2026-05-12': ['🎉 Eurovision — everyone unavailable'],
    '2026-05-13': ['❌ No films today'],
    '2026-05-14': ['🎉 Eurovision — everyone unavailable'],
    '2026-05-15': ['🏉 Warriors vs Leeds Rhinos (home — no cinema)', '🍻 Owen at work drinks'],
    '2026-05-16': ['🎉 Eurovision — everyone unavailable'],
    '2026-05-18': ['🎾 Tennis — everyone unavailable'],
    '2026-05-19': ['⚠️ Owen unavailable (seeing Sam)'],
    '2026-05-21': ['🚂 Owen in London'],
    '2026-05-25': ["🏖️ Bank holiday — Owen's normal time constraints relaxed"],
    '2026-05-27': ['🚂 Alice in London'],
    '2026-05-29': ['🎤 Gig — Conor & Alice unavailable'],
    '2026-06-13': ['🎵 Clog Men gig — everyone unavailable'],
    '2026-06-19': ['🗳️ By-election day after — Owen unavailable'],
    '2026-06-20': ['🚗 Nottingham Escape Trip — everyone unavailable'],
    '2026-06-21': ['🚗 Nottingham Escape Trip — everyone unavailable'],
    '2026-06-22': ['🚗 Nottingham Escape Trip — everyone unavailable'],
    '2026-06-23': ['🚗 Nottingham Escape Trip — everyone unavailable'],
    '2026-06-28': ['🎭 Dark Room Man — everyone unavailable'],
    '2026-06-29': ['🎬 Supergirl with Lucy (📌 locked)'],
    '2026-07-21': ['⚠️ Conor unavailable'],
    '2026-08-26': ['🌊 Wales trip — everyone unavailable'],
    '2026-08-27': ['🌊 Wales trip — everyone unavailable'],
    '2026-08-28': ['🌊 Wales trip — everyone unavailable'],
    '2026-08-29': ['🌊 Wales trip — everyone unavailable'],
    '2026-08-30': ['🌊 Wales trip — everyone unavailable'],
    '2026-08-31': ['🌊 Wales trip — everyone unavailable'],
    '2026-09-01': ['🌊 Wales trip — everyone unavailable'],
  };

  function getDayNotes(dateStr, dayName) {
    const notes = [...(dayNotes[dateStr] || [])];
    if (HOME_GAME_DATES.has(dateStr) && !notes.some(n => n.includes('no cinema'))) {
      notes.unshift('🏟️ Home match day — no cinema (Conor working)');
    }
    const isBankHoliday = BANK_HOLIDAYS_RELAXED.has(dateStr);
    if (dayName === 'Sunday') notes.push('🕐 Owen working — films after 3pm only');
    else if (['Monday','Tuesday','Wednesday','Thursday','Friday'].includes(dayName) && !isBankHoliday) {
      notes.push('🕐 Owen working — films after 7:35pm only');
    }
    if (dayName === 'Thursday' && dateStr >= '2026-05-28') notes.push('🍺 Pub quiz — Conor & Owen unavailable');
    return notes;
  }

  let currentMonth = null;

  days.forEach(dateStr => {
    const d = parseDateStr(dateStr);
    const dayName = dayNames[d.getDay()];
    const films = schedMap[dateStr] || [];
    const isToday = dateStr === TODAY;
    const hasFilm = films.length > 0;
    const notes = getDayNotes(dateStr, dayName);

    const month = d.getMonth();
    if (month !== currentMonth) {
      currentMonth = month;
      html += `<div style="font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:2px;color:var(--muted);padding:14px 2px 6px;border-bottom:1px solid var(--border);margin-bottom:10px;">${monthsFull[month].toUpperCase()} ${d.getFullYear()}</div>`;
    }

    html += `<div class="day-block ${hasFilm ? 'has-film' : ''}">`;
    html += `<div class="day-header ${hasFilm ? 'has-film' : ''} ${isToday ? 'today' : ''}">`;
    html += `<span class="day-name">${dayName.toUpperCase()}</span>`;
    html += `<div style="display:flex;gap:8px;align-items:center">`;
    if (isToday) html += `<span class="today-badge">TODAY</span>`;
    html += `<span class="day-date">${d.getDate()} ${monthNames[d.getMonth()]}</span>`;
    html += `</div></div>`;

    if (!hasFilm) {
      if (notes.length > 0) {
        notes.forEach(note => {
          html += `<div style="padding:5px 14px;font-size:12px;color:var(--muted);background:var(--surface2);border-top:1px solid var(--border)">${note}</div>`;
        });
      } else {
        html += `<div class="empty-day">—</div>`;
      }
    } else {
      const sorted = [...films].sort((a, b) => a.showing.start.localeCompare(b.showing.start));
      sorted.forEach((f, i) => {
        const s = f.showing;
        html += `<div class="film-card">`;
        // Check if this is the active countdown film
        const cdId = 'cd_' + s.date + '_' + s.start.replace(':','');
        const filmStartMs = showingMs(s.date, s.start) + PRE_SHOW_MINS * 60000;
        const filmEndMs = showingMs(s.date, s.end);
        const nowNow = Date.now();
        const isActive = activeCdId === cdId && (nowNow < filmEndMs);
        const isCountingToStart = nowNow < filmStartMs;
        const isShowing = nowNow >= filmStartMs && nowNow < filmEndMs;
        const targetMs = isShowing ? filmEndMs : filmStartMs;
        const cdLabel = isShowing ? 'ends' : 'starts';

        html += `<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;">`;
        html += `<div style="flex:1;min-width:0;">`;
        html += `<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:5px;">${typeBadge(f.title, f.is_rerelease, s.is_maxx, f.is_estimated)}${ratingBadge(f.rating)}</div>`;
        html += `<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">`;
        html += `<div class="film-name">${f.title}</div>`;
        if (isActive) {
          html += `<span id="${cdId}" style="font-size:11px;font-weight:700;color:var(--danger);white-space:nowrap;font-family:monospace;"></span>`;
          html += `<span style="font-size:10px;color:var(--muted);">${cdLabel}</span>`;
        }
        html += `</div>`;
        if (f.genres && f.genres.length) html += `<div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:4px;">${genreChips(f.genres)}</div>`;
        html += `</div>`;
        html += `<div style="text-align:right;flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:4px;">`;
        html += `<span style="font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:1px;color:var(--accent);line-height:1">${s.start}</span>`;
        html += `<span style="font-size:11px;color:var(--muted);">ends ${s.end}</span>`;
        if (s.screen) html += `<span style="font-size:11px;color:var(--muted);">${s.screen}</span>`;
        if (s.url) html += `<div style="margin-top:4px;">${availBtn(s.url)}</div>`;
        html += `</div></div>`;
        html += `</div>`;

        // Register countdown ticker for active film
        if (isActive) {
          setTimeout(() => {
            function tick() {
              const el = document.getElementById(cdId);
              if (!el) return;
              const diff = targetMs - Date.now();
              if (diff <= 0) {
                // Countdown finished — rebuild calendar to show next state
                buildWeekPage();
                return;
              }
              const totalMins = Math.floor(diff / 60000);
              const hrs = Math.floor(totalMins / 60);
              const mins = totalMins % 60;
              const secs = Math.floor((diff % 60000) / 1000);
              if (hrs > 0) {
                el.textContent = `${hrs}h ${String(mins).padStart(2,'0')}m ${String(secs).padStart(2,'0')}s`;
              } else {
                el.textContent = `${String(mins).padStart(2,'0')}m ${String(secs).padStart(2,'0')}s`;
              }
              setTimeout(tick, 1000);
            }
            tick();
          }, 50);
        }

        if (i < sorted.length - 1) {
          const endMins = timeToMins(s.end);
          const nextStartMins = timeToMins(sorted[i+1].showing.start);
          const gap = nextStartMins - endMins;
          if (gap >= 0) {
            const hrs = Math.floor(gap / 60);
            const mins = gap % 60;
            const gapStr = hrs > 0 ? `${hrs}h ${mins}m` : `${mins}m`;
            const gapColour = gap < 30 ? 'var(--danger)' : gap < 90 ? 'var(--accent)' : 'var(--muted)';
            html += `<div class="gap-indicator">`;
            html += `<div class="gap-line"></div>`;
            html += `<span style="font-size:11px;font-weight:600;color:${gapColour};white-space:nowrap">⏱ ${gapStr} gap</span>`;
            html += `<div class="gap-line"></div>`;
            html += `</div>`;
          }
        }
      });
      // Notes at the very bottom of the day block
      if (notes.length > 0) {
        notes.forEach(note => {
          html += `<div style="padding:5px 14px;font-size:12px;color:var(--muted);background:var(--surface2);border-top:1px solid var(--border)">${note}</div>`;
        });
      }
    }

    html += `</div>`;
  });

  el.innerHTML = html;
}

// ========== PAGE: FUTURE ==========
function buildFuturePage() {
  const el = document.getElementById('page-future');
  const todayDate = parseDateStr(TODAY);

  // Get all films with watchable showings beyond this week
  const sevenDaysLater = new Date(todayDate);
  sevenDaysLater.setDate(sevenDaysLater.getDate() + 7);
  const cutoff = `${sevenDaysLater.getFullYear()}-${String(sevenDaysLater.getMonth()+1).padStart(2,'0')}-${String(sevenDaysLater.getDate()).padStart(2,'0')}`;

  // Find all films with future watchable showings
  const futureFilms = [];
  DATA.all_films.forEach(film => {
    const futureShowings = film.showings.filter(s => !s.blocked && s.date >= cutoff);
    if (futureShowings.length > 0) {
      futureFilms.push({ ...film, futureShowings });
    }
  });

  // Sort all films by their scheduled date (if scheduled), then by first available showing
  const scheduledMap = {};
  DATA.schedule.forEach(s => { scheduledMap[s.title] = s; });

  futureFilms.sort((a, b) => {
    const aDate = scheduledMap[a.title]?.showing.date || a.futureShowings[0]?.date || '9999';
    const bDate = scheduledMap[b.title]?.showing.date || b.futureShowings[0]?.date || '9999';
    return aDate.localeCompare(bDate);
  });

  const newFuture = futureFilms.filter(f => !f.is_rerelease);
  const reFuture = futureFilms.filter(f => f.is_rerelease);

  function renderGroup(films, label) {
    if (films.length === 0) return '';
    let html = `<div class="section-title">${label}<span class="section-count">${films.length} films</span></div>`;
    films.forEach(film => {
      const scheduled = scheduledMap[film.title];
      const topShowings = film.futureShowings.slice(0, 4);
      html += `<div class="future-film-card">`;
      html += `<div class="film-title-row">${typeBadge(film.title, film.is_rerelease, scheduled ? scheduled.showing.is_maxx : film.futureShowings[0]?.is_maxx, film.is_estimated)}${ratingBadge(film.rating)}<span class="film-name">${film.title}</span></div>`;
      if (film.genres && film.genres.length) {
        html += `<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;">${genreChips(film.genres)}</div>`;
      }
      if (scheduled) {
        html += `<div style="margin-bottom:8px;padding:6px 10px;background:rgba(232,196,90,0.1);border-radius:6px;border:1px solid rgba(232,196,90,0.3);font-size:12px;color:var(--accent)">`;
        html += `📅 Scheduled: ${formatDate(scheduled.showing.date)} at ${scheduled.showing.start}</div>`;
      }
      html += `<div class="future-date-row">`;
      topShowings.forEach(s => {
        html += `<span class="date-chip"><strong>${formatDate(s.date)}</strong> ${s.start}</span>`;
      });
      if (film.futureShowings.length > 4) {
        html += `<span class="more-dates">+${film.futureShowings.length - 4} more</span>`;
      }
      html += `</div>`;
      html += `</div>`;
    });
    return html;
  }

  let html = `<div class="week-header"><h2>COMING UP</h2><span class="subtitle">Ordered by scheduled date</span></div>`;

  if (futureFilms.length === 0) {
    html += `<div class="no-results">No upcoming scheduled screenings beyond this week.</div>`;
  } else {
    html += renderGroup(newFuture, 'NEW FILMS');
    html += renderGroup(reFuture, 'RE-RELEASES & EVENTS');
  }

  el.innerHTML = html;
}

// ========== PAGE: ALL SCREENINGS ==========
function buildScreeningsPage() {
  const el = document.getElementById('page-screenings');

  // Sort by last watchable showing date (most urgent first)
  function lastWatchableDate(film) {
    const watchable = film.showings.filter(s => !s.blocked && s.all_can_watch);
    if (!watchable.length) return '9999';
    return watchable.reduce((max, s) => s.date > max ? s.date : max, '0000');
  }

  const allFilmsSorted = [...DATA.all_films].sort((a, b) =>
    lastWatchableDate(a).localeCompare(lastWatchableDate(b))
  );
  const newFilms = allFilmsSorted.filter(f => !f.is_rerelease);
  const reFilms = allFilmsSorted.filter(f => f.is_rerelease);

  // Build by-date index
  const byDate = {};
  DATA.all_films.forEach(film => {
    film.showings.forEach(s => {
      if (s.blocked) return;
      if (!byDate[s.date]) byDate[s.date] = [];
      byDate[s.date].push({ film, showing: s });
    });
  });

  function renderFilmGroup(film) {
    const watchableCount = film.showings.filter(s => !s.blocked && s.all_can_watch).length;
    const lastDate = lastWatchableDate(film);
    const id = 'fg_' + film.title.replace(/[^a-z0-9]/gi, '');
    let html = `<div class="film-group" id="${id}">`;
    html += `<div class="film-group-header" onclick="toggleGroup('${id}')">`;
    html += typeBadge(film.title, film.is_rerelease, film.showings.some(s => s.is_maxx), film.is_estimated);
    html += ratingBadge(film.rating);
    html += `<span class="film-name">${film.title}</span>`;
    if (lastDate !== '9999') {
      const urgency = lastDate <= TODAY ? 'var(--danger)' : lastDate <= addDays(TODAY, 7) ? 'var(--accent)' : 'var(--muted)';
      html += `<span style="font-size:11px;color:${urgency};margin-left:auto;padding-right:6px;">last: ${formatDate(lastDate)}</span>`;
    }
    html += `<span class="expand-icon">▼</span>`;
    html += `</div>`;
    html += `<div class="film-group-showings">`;
    film.showings.forEach(s => {
      const blocked = s.blocked;
      html += `<div class="showing-row ${blocked ? 'blocked' : ''}">`;
      html += `<span class="showing-time">${s.start}</span>`;
      html += `<span class="showing-date">${formatDate(s.date)}</span>`;
      if (s.is_maxx) html += `<span class="film-type-badge badge-maxx" style="font-size:9px;padding:2px 5px">MAXX</span>`;
      if (!blocked) {
        html += `<div class="showing-attendees">${attendeeChips(s.attendees)}</div>`;
      } else {
        html += `<span class="showing-reason">${s.reasons.map(reasonLabel).join(' · ')}</span>`;
      }
      html += `</div>`;
    });
    html += `</div></div>`;
    return html;
  }

  function renderByDate() {
    const dates = Object.keys(byDate).sort();
    if (!dates.length) return `<div class="no-results">No available screenings found.</div>`;
    let html = '';
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const monthsFull = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    let currentMonth = null;
    dates.forEach(dateStr => {
      const d = parseDateStr(dateStr);
      const month = d.getMonth();
      if (month !== currentMonth) {
        currentMonth = month;
        html += `<div style="font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:2px;color:var(--muted);padding:14px 2px 6px;border-bottom:1px solid var(--border);margin-bottom:10px;">${monthsFull[month].toUpperCase()} ${d.getFullYear()}</div>`;
      }
      const dayNames = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
      const dayName = dayNames[d.getDay()];
      const entries = byDate[dateStr].sort((a,b) => a.showing.start.localeCompare(b.showing.start));
      html += `<div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:10px;overflow:hidden;">`;
      html += `<div class="day-header has-film"><span class="day-name">${dayName.toUpperCase()}</span><span class="day-date">${d.getDate()} ${months[month]}</span></div>`;
      entries.forEach(({film, showing}) => {
        html += `<div class="film-card" style="border-top:1px solid var(--border);">`;
        html += `<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;">`;
        html += `<div style="flex:1;min-width:0;">`;
        html += `<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:5px;">${typeBadge(film.title, film.is_rerelease, showing.is_maxx, film.is_estimated)}${ratingBadge(film.rating)}</div>`;
        html += `<div class="film-name">${film.title}</div>`;
        html += `</div>`;
        html += `<div style="text-align:right;flex-shrink:0;">`;
        html += `<div style="font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--accent);line-height:1">${showing.start}</div>`;
        html += `<div style="font-size:11px;color:var(--muted);">ends ${showing.end}</div>`;
        if (showing.screen) html += `<div style="font-size:11px;color:var(--muted);">${showing.screen}</div>`;
        html += `</div></div>`;
        if (film.genres && film.genres.length) html += `<div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:6px;">${genreChips(film.genres)}</div>`;
        html += `</div>`;
      });
      html += `</div>`;
    });
    return html;
  }

  // Build full HTML with view toggle
  const totalWatchable = DATA.all_films.reduce((a,f) => a + f.showings.filter(s=>!s.blocked && s.all_can_watch).length, 0);

  let html = `<div class="week-header"><h2>ALL SCREENINGS</h2><span class="subtitle">Every available showing</span></div>`;

  // View toggle
  html += `<div style="display:flex;gap:8px;margin-bottom:12px;">`;
  html += `<button id="view-by-film" onclick="switchScreeningsView('film')" style="font-size:12px;font-weight:700;padding:6px 14px;border-radius:20px;background:var(--accent);color:var(--bg);border:none;cursor:pointer;">By Film</button>`;
  html += `<button id="view-by-date" onclick="switchScreeningsView('date')" style="font-size:12px;font-weight:700;padding:6px 14px;border-radius:20px;background:var(--surface2);color:var(--muted);border:1px solid var(--border);cursor:pointer;">By Date</button>`;
  html += `</div>`;

  // By Film view
  html += `<div id="screenings-by-film">`;
  html += `<input class="search-box" type="text" placeholder="Search films..." oninput="filterScreenings(this.value)" id="screenSearch">`;
  html += `<div class="count-row"><span class="count-chip"><strong>${DATA.all_films.length}</strong> films</span><span class="count-chip"><strong>${totalWatchable}</strong> watchable showings</span></div>`;
  html += `<div id="screenings-list">`;
  html += `<div class="section-title">NEW FILMS <span style="font-size:11px;font-weight:400;color:var(--muted);letter-spacing:0;">sorted by last screening date</span><span class="section-count">${newFilms.length}</span></div>`;
  newFilms.forEach(f => { html += renderFilmGroup(f); });
  html += `<div class="section-title" style="margin-top:16px">RE-RELEASES & EVENTS<span class="section-count">${reFilms.length}</span></div>`;
  reFilms.forEach(f => { html += renderFilmGroup(f); });
  html += `</div></div>`;

  // By Date view
  html += `<div id="screenings-by-date" style="display:none;">`;
  html += renderByDate();
  html += `</div>`;

  el.innerHTML = html;
}

function addDays(dateStr, n) {
  const d = parseDateStr(dateStr);
  d.setDate(d.getDate() + n);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function switchScreeningsView(view) {
  document.getElementById('screenings-by-film').style.display = view === 'film' ? '' : 'none';
  document.getElementById('screenings-by-date').style.display = view === 'date' ? '' : 'none';
  const filmBtn = document.getElementById('view-by-film');
  const dateBtn = document.getElementById('view-by-date');

function toggleGroup(id) {

}

function filterScreenings(val) {
  const v = val.toLowerCase();

  document.querySelectorAll('#screenings-list .film-group').forEach(g => {
    const title = g.querySelector('.film-name').textContent.toLowerCase();
    g.style.display = title.includes(v) ? '' : 'none';

}

// ========== PAGE: IMPOSSIBLE ==========
function buildImpossiblePage() {
  const el = document.getElementById('page-impossible');
  let html = `<div class="week-header"><h2>CAN'T WATCH</h2><span class="subtitle">Films with no viable screenings</span></div>`;

  // Partial group section
  if (DATA.partial_group && DATA.partial_group.length > 0) {
    html += `<div class="section-title">PARTIAL GROUP<span class="section-count">${DATA.partial_group.length} films</span></div>`;
    html += `<div style="font-size:12px;color:var(--muted);margin-bottom:12px;">These films can't be watched by all three of you together — shown here with who CAN attend.</div>`;

    DATA.partial_group.forEach(film => {
      const s = film.showing;
      const attendees = s.attendees || [];
      html += `<div class="impossible-card" style="border-color:rgba(232,196,90,0.3);background:rgba(232,196,90,0.05);">`;
      html += `<div class="film-title-row">${typeBadge(film.title, film.is_rerelease, s.is_maxx)}${ratingBadge(film.rating)}<span class="film-name">${film.title}</span></div>`;
      if (film.genres && film.genres.length) {
        html += `<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;">${genreChips(film.genres)}</div>`;
      }
      html += `<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:8px">`;
      html += `<span style="font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--accent)">${s.start}</span>`;
      html += `<span style="font-size:12px;color:var(--muted)">ends ${s.end}</span>`;
      html += `<span class="film-screen">${s.screen}</span>`;
      html += `<span style="font-size:12px;color:var(--muted)">${formatDate(s.date)}</span>`;
      html += `</div>`;
      html += `<div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px">Can attend:</div>`;
      html += `<div class="attendees-row" style="justify-content:space-between;align-items:center;">${attendeeChips(attendees)}${film.showing?.url ? availBtn(film.showing.url) : ''}</div>`;
      if (film.note) {
        html += `<div style="font-size:11px;color:var(--accent);margin-top:6px;padding:5px 8px;background:rgba(232,196,90,0.1);border-radius:5px">ℹ️ ${film.note}</div>`;
      }
      html += `</div>`;
    });
  }

  // Truly impossible section
  if (DATA.impossible_films.length > 0) {
    html += `<div class="section-title" style="margin-top:${DATA.partial_group?.length ? '20px' : '0'}">NO VIABLE SCREENINGS<span class="section-count">${DATA.impossible_films.length} films</span></div>`;
    DATA.impossible_films.forEach(film => {
      html += `<div class="impossible-card">`;
      html += `<div class="film-title-row">${typeBadge(film.title, film.is_rerelease, film.showings.some(s => s.is_maxx), film.is_estimated)}${ratingBadge(film.rating)}<span class="film-name">${film.title}</span></div>`;
      if (film.genres && film.genres.length) {
        html += `<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;">${genreChips(film.genres)}</div>`;
      }
      const reasons = [...new Set(film.showings.flatMap(s => s.reasons))];
      reasons.forEach(r => { html += `<span class="reason-badge">${reasonLabel(r)}</span> `; });
      html += `<div style="margin-top:8px;font-size:12px;color:var(--muted)">Available showings:</div>`;
      film.showings.forEach(s => {
        html += `<div style="font-size:12px;padding:3px 0;color:var(--muted)">${formatDate(s.date)} at ${s.start}</div>`;
      });
      html += `</div>`;
    });
  }

  if (!DATA.impossible_films.length && !DATA.partial_group?.length) {
    html += `<div class="no-results">No impossible films — great scheduling!</div>`;
  }

  html += `<div class="section-title" style="margin-top:20px">SCHEDULING RULES<span class="section-count">active</span></div>`;
  html += `<div class="rules-card"><h3>Current Rules</h3>`;
  const rules = [
    ['All three must attend', 'Films are only scheduled if Owen, Conor & Alice can all make it'],
    ['Weekday evenings', 'Films must start at 7:35pm or later (Owen at work)'],
    ['Sunday', 'Films must start after 3:00pm (Owen at work)'],
    ['Thursday from 28 May', 'No Thursday evenings (pub quiz — Owen & Conor)'],
    ['Home games', 'No films when Wigan Warriors or Athletic play at home (Conor works)'],
    ['Children\'s films', 'Excluded unless in priority list'],
    ['Priority', 'New films scheduled before re-releases & anniversaries'],
  ];
  rules.forEach(([label, detail]) => {
    html += `<div class="rule-item"><strong>${label}:</strong> <span>${detail}</span></div>`;
  });
  html += `</div>`;

  el.innerHTML = html;
}

// ========== PAGE: MISSED ==========
function buildMissedPage() {
  const el = document.getElementById('page-missed');
  const missed = DATA.missed_films || [];

  let html = `<div class="week-header"><h2>MISSED</h2><span class="subtitle">Expired without watching</span></div>`;
  html += `<div class="note-box">These films showed at Omniplex Wigan but expired before you had a chance to see them. Data sourced from screening history.</div>`;

  if (missed.length === 0) {
    html += `<div class="no-results">No missed films on record yet.</div>`;
    el.innerHTML = html;
    return;
  }

  html += `<div class="count-row">`;
  html += `<span class="count-chip"><strong>${missed.length}</strong> missed films</span>`;
  html += `</div>`;

  missed.forEach(film => {
    const lastDate = parseDateStr(film.last_seen);
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const lastStr = `${lastDate.getDate()} ${months[lastDate.getMonth()]} ${lastDate.getFullYear()}`;
    const firstDate = parseDateStr(film.first_seen);
    const firstStr = `${firstDate.getDate()} ${months[firstDate.getMonth()]} ${firstDate.getFullYear()}`;
    const runDays = Math.round((lastDate - firstDate) / (1000 * 60 * 60 * 24)) + 1;

    html += `<div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:10px;">`;

    // Title
    html += `<div style="font-size:15px;font-weight:600;color:var(--text);margin-bottom:8px;">`;
    html += `<span style="font-size:9px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;padding:3px 6px;border-radius:4px;background:rgba(248,113,113,0.15);color:var(--danger);margin-right:6px;">MISSED</span>`;
    html += `${film.title}</div>`;

    // Stats row
    html += `<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">`;
    html += `<span style="font-size:11px;color:var(--muted);background:var(--surface2);padding:3px 8px;border-radius:5px;border:1px solid var(--border);">`;
    html += `📅 Last showing: <strong style="color:var(--text)">${lastStr}</strong></span>`;
    html += `<span style="font-size:11px;color:var(--muted);background:var(--surface2);padding:3px 8px;border-radius:5px;border:1px solid var(--border);">`;
    html += `🎬 ${film.max_screenings} screenings</span>`;
    html += `</div>`;
    html += `</div>`;
  });

  el.innerHTML = html;
}

// Overlap guard — used during schedule building to reject clashing slots
function hasOverlap(dateStr, startStr, endStr) {
  const start = timeToMins(startStr);
  const end = timeToMins(endStr);
  return DATA.schedule.some(s =>
    s.showing.date === dateStr &&
    timeToMins(s.showing.start) < end &&
    timeToMins(s.showing.end) > start
  );
}

// ========== PAGE: STATS ==========
function buildStatsPage() {
  const el = document.getElementById('page-stats');

  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const monthsFull = ['January','February','March','April','May','June','July','August','September','October','November','December'];

  function fmtDate(dateStr) {
    const d = parseDateStr(dateStr);
    return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
  }
  function fmtMonth(ym) {
    const [y,m] = ym.split('-');
    return months[parseInt(m)-1] + ' ' + y.slice(2);
  }
  function fmtWeekShort(dateStr) {
    const d = parseDateStr(dateStr);
    return `${d.getDate()} ${months[d.getMonth()]}`;
  }

  function statCard(value, label, sub) {
    return `<div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;flex:1;min-width:130px;">
      <div style="font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:1px;color:var(--accent);line-height:1">${value}</div>
      <div style="font-size:13px;font-weight:600;color:var(--text);margin-top:2px">${label}</div>
      ${sub ? `<div style="font-size:11px;color:var(--muted);margin-top:2px">${sub}</div>` : ''}
    </div>`;
  }

  function recordRow(emoji, label, value, sub) {
    return `<div style="display:flex;align-items:flex-start;gap:12px;padding:10px 14px;border-bottom:1px solid var(--border);">
      <span style="font-size:18px;flex-shrink:0;line-height:1.4">${emoji}</span>
      <div style="flex:1;min-width:0;">
        <div style="font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;font-weight:600;">${label}</div>
        <div style="font-size:15px;font-weight:700;color:var(--accent);margin-top:1px;">${value}</div>
        ${sub ? `<div style="font-size:11px;color:var(--muted);margin-top:2px;">${sub}</div>` : ''}
      </div>
    </div>`;
  }

  const R = STATS.record_stats;
  const currentPct = STATS.current_total > 0 ? Math.round(STATS.current_seen / STATS.current_total * 100) : 0;
  const totalWeeks = Math.round((new Date(STATS.watch_end) - new Date(STATS.watch_start)) / (7*24*60*60*1000));

  let html = `<div class="week-header"><h2>STATS</h2><span class="subtitle">Since ${fmtDate(STATS.watch_start)}</span></div>`;

  // Top stat cards
  html += `<div style="display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap;">`;
  html += statCard(R.total_overall, 'Films Watched', `over ~${totalWeeks} weeks`);
  html += statCard(R.total_this_year, 'Films in 2026', `so far this year`);
  html += `</div>`;
  html += `<div style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;">`;
  html += statCard(currentPct + '%', 'Currently Seen', `${STATS.current_seen} of ${STATS.current_total} showing`);
  html += statCard(STATS.seen_share_pct + '%', 'Screen Share', 'of all current screenings');
  html += `</div>`;

  // Records box
  html += `<div class="section-title">RECORDS</div>`;
  html += `<div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:16px;">`;
  html += recordRow('🏆', 'Most in a single day',
    `${R.most_in_day.count} films — ${fmtDate(R.most_in_day.date)}`,
    R.most_in_day.titles.join(', '));
  html += recordRow('📅', 'Most in a single week',
    `${R.most_in_week.count} films — w/c ${fmtDate(R.most_in_week.week)}`,
    R.most_in_week.titles.join(', '));
  html += recordRow('🗓️', 'Most in a single month',
    `${R.most_in_month.count} films — ${fmtMonth(R.most_in_month.month)}`,
    R.most_in_month.titles.slice(0,5).join(', ') + (R.most_in_month.titles.length > 5 ? ` +${R.most_in_month.titles.length-5} more` : ''));
  html += recordRow('🔥', 'Longest streak',
    `${R.longest_streak.days} consecutive days`,
    `${fmtDate(R.longest_streak.from)} → ${fmtDate(R.longest_streak.to)}`);
  html += recordRow('🏜️', 'Longest gap without a film',
    `${R.longest_gap.days} days`,
    `${fmtDate(R.longest_gap.from)} → ${fmtDate(R.longest_gap.to)}`);
  html += recordRow('🎬', 'Total cinema days',
    `${R.cinema_days} days`,
    `avg ${R.avg_per_cinema_day} films per visit`);
  html += recordRow('📊', 'Weekly average',
    `${STATS.avg_per_active_week} films/week`,
    `on the ${STATS.weeks_active} weeks you went`);
  html += `<div style="height:1px;background:transparent;"></div>`; // remove last border
  html += `</div>`;

  // % seen over time
  html += `<div class="section-title">% OF CURRENT FILMS SEEN<span class="section-count">over time</span></div>`;
  html += `<div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:16px;"><canvas id="pct-chart" style="width:100%;height:160px;display:block;"></canvas></div>`;

  // Films per month/week toggle
  html += `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">`;
  html += `<div class="section-title" style="margin-bottom:0">FILMS WATCHED</div>`;
  html += `<div style="display:flex;gap:6px;">`;
  html += `<button id="btn-month" onclick="switchPeriod('month')" style="font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;background:var(--accent);color:var(--bg);border:none;cursor:pointer;">Month</button>`;
  html += `<button id="btn-week" onclick="switchPeriod('week')" style="font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;background:var(--surface2);color:var(--muted);border:1px solid var(--border);cursor:pointer;">Week</button>`;
  html += `</div></div>`;
  html += `<div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:16px;"><canvas id="period-chart" style="width:100%;height:160px;display:block;"></canvas></div>`;

  // Day of week
  html += `<div class="section-title">FAVOURITE DAY TO GO</div>`;
  html += `<div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:16px;"><canvas id="day-chart" style="width:100%;height:140px;display:block;"></canvas></div>`;

  // Film popularity
  html += `<div class="section-title">FILMS WATCHED BY POPULARITY<span class="section-count">screenings when seen</span></div>`;
  html += `<div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:16px;">`;
  STATS.film_popularity.forEach((f, i) => {
    const barPct = Math.round(f.screenings / STATS.film_popularity[0].screenings * 100);
    html += `<div style="padding:8px 14px;${i>0?'border-top:1px solid var(--border);':''}display:flex;align-items:center;gap:10px;">`;
    html += `<span style="font-size:11px;color:var(--muted);min-width:18px;text-align:right">${i+1}</span>`;
    html += `<div style="flex:1;min-width:0;"><div style="font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${f.title}</div>`;
    html += `<div style="margin-top:4px;height:4px;background:var(--border);border-radius:2px;"><div style="height:4px;width:${barPct}%;background:var(--accent);border-radius:2px;"></div></div></div>`;
    html += `<span style="font-size:12px;font-weight:600;color:var(--accent);flex-shrink:0;">${f.screenings}</span></div>`;
  });
  html += `</div>`;

  el.innerHTML = html;

  requestAnimationFrame(() => {
    drawLineChart('pct-chart',
      STATS.pct_timeline.map(p => p.date),
      STATS.pct_timeline.map(p => p.pct),
      '%', 100);
    drawBarChart('period-chart',
      STATS.month_data.map(m => fmtMonth(m.month)),
      STATS.month_data.map(m => m.count));
    drawBarChart('day-chart',
      STATS.day_data.map(d => d.day.slice(0,3)),
      STATS.day_data.map(d => d.count));
  });
}

let _currentPeriod = 'month';
function switchPeriod(period) {
  _currentPeriod = period;
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  function fmtMonth(ym) { const [y,m]=ym.split('-'); return months[parseInt(m)-1]+' '+y.slice(2); }
  function fmtWeekShort(dateStr) { const d=parseDateStr(dateStr); return `${d.getDate()} ${months[d.getMonth()]}`; }
  const labels = period==='month'
    ? STATS.month_data.map(m => fmtMonth(m.month))
    : STATS.films_per_week.map(w => fmtWeekShort(w.week));
  const values = period==='month'
    ? STATS.month_data.map(m => m.count)
    : STATS.films_per_week.map(w => w.count);
  drawBarChart('period-chart', labels, values);
  ['month','week'].forEach(p => {
    const btn = document.getElementById('btn-'+p);
    if (!btn) return;
    btn.style.background = p===period ? 'var(--accent)' : 'var(--surface2)';
    btn.style.color = p===period ? 'var(--bg)' : 'var(--muted)';
    btn.style.border = p===period ? 'none' : '1px solid var(--border)';
  });
}

function drawLineChart(canvasId, labels, values, unit, maxOverride) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.offsetWidth || 300;
  const H = parseInt(canvas.style.height) || 180;
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  const pad = {top:12, right:16, bottom:28, left:36};
  const cw = W - pad.left - pad.right, ch = H - pad.top - pad.bottom;
  const max = maxOverride || Math.max(...values, 1);
  const accent = '#e8c45a', muted = '#7a7d88', border = '#2a2d34';

  [0,25,50,75,100].forEach(v => {
    if (v > max + 5) return;
    const y = pad.top + ch - (v/max)*ch;
    ctx.strokeStyle = border; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(pad.left+cw, y); ctx.stroke();
    ctx.fillStyle = muted; ctx.font = '10px sans-serif'; ctx.textAlign = 'right';
    ctx.fillText(v+unit, pad.left-4, y+3);
  });

  const pts = values.map((v,i) => ({x: pad.left+(i/(values.length-1||1))*cw, y: pad.top+ch-(v/max)*ch}));
  ctx.strokeStyle = accent; ctx.lineWidth = 2; ctx.lineJoin = 'round';
  ctx.beginPath(); pts.forEach((p,i) => i===0 ? ctx.moveTo(p.x,p.y) : ctx.lineTo(p.x,p.y)); ctx.stroke();
  ctx.fillStyle = 'rgba(232,196,90,0.08)';
  ctx.beginPath(); pts.forEach((p,i) => i===0 ? ctx.moveTo(p.x,p.y) : ctx.lineTo(p.x,p.y));
  ctx.lineTo(pts[pts.length-1].x, pad.top+ch); ctx.lineTo(pts[0].x, pad.top+ch); ctx.closePath(); ctx.fill();
  pts.forEach(p => { ctx.fillStyle=accent; ctx.beginPath(); ctx.arc(p.x,p.y,3,0,Math.PI*2); ctx.fill(); });

  [0, Math.floor(labels.length/2), labels.length-1].forEach(i => {
    if (!labels[i]) return;
    const d = parseDateStr(labels[i]);
    const mo = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    ctx.fillStyle=muted; ctx.font='10px sans-serif'; ctx.textAlign='center';
    ctx.fillText(`${d.getDate()} ${mo[d.getMonth()]}`, pts[i].x, H-6);
  });
}

function drawBarChart(canvasId, labels, values) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.offsetWidth || 300;
  const H = parseInt(canvas.style.height) || 160;
  canvas.width = W*dpr; canvas.height = H*dpr;
  canvas.style.width = W+'px'; canvas.style.height = H+'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  const pad = {top:14, right:10, bottom:24, left:10};
  const cw = W-pad.left-pad.right, ch = H-pad.top-pad.bottom;
  const max = Math.max(...values, 1);
  const accent = '#e8c45a', muted = '#7a7d88', surface2 = '#1e2024';
  const gap = cw/labels.length, barW = gap*0.6;

  values.forEach((v, i) => {
    const x = pad.left + i*gap + (gap-barW)/2;
    const barH = (v/max)*ch, y = pad.top+ch-barH;
    ctx.fillStyle = v===max ? accent : surface2;
    ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(x,y,barW,barH,3); else ctx.rect(x,y,barW,barH);
    ctx.fill();
    if (v > 0) {
      ctx.fillStyle = v===max ? accent : muted;
      ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText(v, x+barW/2, y-3);
    }
    ctx.fillStyle=muted; ctx.font='10px sans-serif'; ctx.textAlign='center';
    ctx.fillText(labels[i], x+barW/2, H-6);
  });
}

function showReviewSection(section) {
  ['rate','view','profile'].forEach(s => {
    const sec = document.getElementById('rev-' + s + '-section');
    if (sec) sec.style.display = s === section ? '' : 'none';
    const btn = document.getElementById('rev-btn-' + s);
    if (!btn) return;
    btn.style.background = s === section ? 'var(--accent)' : 'var(--surface2)';
    btn.style.color = s === section ? 'var(--bg)' : 'var(--muted)';
    btn.style.border = s === section ? 'none' : '1px solid var(--border)';
  });
  if (section === 'view') loadReviews();
}

async function onPersonChange() {
  // Pre-load reviews so dropdown can colour reviewed films
  if (!_reviewCache && REVIEWS_WEBHOOK_URL && REVIEWS_WEBHOOK_URL !== 'YOUR_APPS_SCRIPT_URL_HERE') {
    try {
      const res = await fetch(REVIEWS_WEBHOOK_URL + '?action=get');
      const d = await res.json();
      sanitiseReviews(d);
      _reviewCache = d;
    } catch(e) {}
  }
  // Refresh dropdown if it's open
  const dd = document.getElementById('rev-film-dropdown');
  if (dd && dd.style.display !== 'none') {
    filterFilmDropdown(document.getElementById('rev-film-search').value);
  }
}

function filterFilmDropdown(query) {
  const dd = document.getElementById('rev-film-dropdown');
  const q = query.toLowerCase().trim();
  const matches = q ? ALL_FILM_TITLES.filter(t => t.toLowerCase().includes(q)).slice(0, 30) : ALL_FILM_TITLES.slice(0, 30);

  // Find which films the selected person has already reviewed
  const person = document.getElementById('rev-person')?.value;
  const reviewedByPerson = new Set();
  if (person && _reviewCache) {
    _reviewCache.filter(r => r.person === person).forEach(r => reviewedByPerson.add(r.film));
  }

  dd.innerHTML = matches.map(t => {
    const reviewed = reviewedByPerson.has(t);
    return `<div onclick="selectFilm('${t.replace(/'/g, "\\'")}');event.stopPropagation();"
      style="padding:8px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;${reviewed ? 'color:var(--new);' : ''}"
      onmouseover="this.style.background='var(--surface2)'" onmouseout="this.style.background=''">
      <span>${t}</span>
      ${reviewed ? '<span style="font-size:10px;font-weight:700;letter-spacing:0.5px;opacity:0.8;">✓ REVIEWED</span>' : ''}
    </div>`;
  }).join('') || `<div style="padding:8px 12px;color:var(--muted);font-size:13px;">No results</div>`;
  dd.style.display = 'block';
}

function showFilmDropdown() {
  filterFilmDropdown(document.getElementById('rev-film-search').value);
}

function selectFilm(title) {
  document.getElementById('rev-film-search').value = title;
  document.getElementById('rev-film-value').value = title;
  document.getElementById('rev-film-dropdown').style.display = 'none';
}

function updateSlider(catId) {
  const slider = document.getElementById('slider-' + catId);
  const val = parseInt(slider.value) / 2;
  document.getElementById('val-' + catId).textContent = val.toFixed(1);
  document.getElementById('lbl-' + catId).textContent = getRatingLabel(val);
  // Colour the slider track
  const pct = (slider.value / 10) * 100;
  slider.style.background = `linear-gradient(to right, var(--accent) ${pct}%, var(--border) ${pct}%)`;
  updateScorePreview();
}

function updateScorePreview() {
  let raw = 0;
  CATEGORIES.forEach(cat => {
    const val = parseInt(document.getElementById('slider-' + cat.id)?.value || 5) / 2;
    raw += val * cat.weight;
  });
  // Normalise: weights sum to 1.0 so raw is already correct
  const rounded = Math.round(raw * 2) / 2;
  const pct = Math.round((raw / 5) * 100);
  document.getElementById('score-raw').textContent = raw.toFixed(2);
  document.getElementById('score-rounded').textContent = rounded.toFixed(1);
  document.getElementById('score-pct').textContent = pct + '%';
  document.getElementById('score-label').textContent = getRatingLabel(raw);
}

  window.open('https://www.omniplexcinemas.co.uk/food-and-drinks', '_blank');
}

function submitReview() {
  const person = document.getElementById('rev-person').value;
  const film = document.getElementById('rev-film-value').value || document.getElementById('rev-film-search').value;
  const dateVal = document.getElementById('rev-date').value;
  const notes = document.getElementById('rev-notes').value;

  if (!person) { setRevStatus('Please select a reviewer.', 'var(--danger)'); return; }
  if (!film) { setRevStatus('Please select a film.', 'var(--danger)'); return; }

  // Check for existing review by this person for this film
  if (_reviewCache) {
    const existing = _reviewCache.find(r => r.person === person && r.film === film);
    if (existing) {
      const proceed = confirm(`${person} has already reviewed "${film}" (score: ${parseFloat(existing.raw).toFixed(2)}). Do you want to add another review anyway?`);
      if (!proceed) return;
    }
  }

  const scores = {};
  let raw = 0;
  CATEGORIES.forEach(cat => {
    const val = parseInt(document.getElementById('slider-' + cat.id).value) / 2;
    scores[cat.id] = val;
    raw += val * cat.weight;
  });

  const rounded = Math.round(raw * 2) / 2;
  const pct = Math.round((raw / 5) * 100);

  const payload = { person, film, date: dateVal, notes, scores, raw: raw.toFixed(2), rounded: rounded.toFixed(1), pct, timestamp: new Date().toISOString() };

  if (!REVIEWS_WEBHOOK_URL || REVIEWS_WEBHOOK_URL === 'YOUR_APPS_SCRIPT_URL_HERE') {
    setRevStatus('⚠️ Google Sheets not connected yet — see setup instructions. Score: ' + raw.toFixed(2) + '/5', 'var(--accent)');
    console.log('Review data (would be sent):', JSON.stringify(payload, null, 2));
    return;
  }

  setRevStatus('Saving...', 'var(--muted)');
  fetch(REVIEWS_WEBHOOK_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  }).then(() => {
    setRevStatus('✓ Review saved!', 'var(--new)');
    _reviewCache = null; // invalidate cache
  }).catch(e => {
    setRevStatus('Error saving: ' + e.message, 'var(--danger)');
  });
}

function setRevStatus(msg, color) {
  const el = document.getElementById('rev-status');
  if (el) { el.textContent = msg; el.style.color = color; }
}

let _reviewCache = null;
let _currentFilter = 'All';

function sanitiseReviews(data) {
  // Strip page-title artifacts e.g. "Film Name | Cinema Showtimes"
  data.forEach(r => { if (r.film) r.film = r.film.split(' | ')[0].trim(); });
}

let _currentProfilePerson = null;

async function loadProfile(person) {
  _currentProfilePerson = person;
  // Highlight selected button
  ['Owen','Conor','Alice'].forEach(p => {
    const btn = document.getElementById('prof-btn-' + p);
    if (!btn) return;
    const personColor = `var(--${p.toLowerCase()})`;
    btn.style.background = p === person ? personColor : 'var(--surface2)';
    btn.style.color = p === person ? 'var(--bg)' : personColor;
  });
  const container = document.getElementById('profile-content');
  container.innerHTML = `<div style="text-align:center;padding:20px;color:var(--muted);">Loading ${person}'s reviews...</div>`;

  if (!REVIEWS_WEBHOOK_URL || REVIEWS_WEBHOOK_URL === 'YOUR_APPS_SCRIPT_URL_HERE') {
    container.innerHTML = `<div class="note-box">Google Sheets not connected yet.</div>`;
    return;
  }
  try {
    const res = await fetch(REVIEWS_WEBHOOK_URL + '?action=get');
    const data = await res.json();
    sanitiseReviews(data);
    _reviewCache = data;
    renderProfile(person, data);
  } catch(e) {
    container.innerHTML = `<div style="color:var(--danger);padding:16px;">Failed to load: ${e.message}</div>`;
  }
}

function renderProfile(person, allReviews) {
  const container = document.getElementById('profile-content');
  const myReviews = allReviews
    .filter(r => r.person === person)
    .sort((a, b) => parseFloat(b.raw) - parseFloat(a.raw));

  if (!myReviews.length) {
    container.innerHTML = `<div style="text-align:center;padding:30px;color:var(--muted);">No reviews yet for ${person}.</div>`;
    return;
  }

  const personColor = `var(--${person.toLowerCase()})`;
  let html = `<div style="font-size:12px;color:var(--muted);margin-bottom:12px;">${myReviews.length} reviews · sorted by score</div>`;

  // Store for index lookup by delete/edit
  window._profileReviews = myReviews;

  myReviews.forEach((r, i) => {
    const raw = parseFloat(r.raw);
    const rowId = 'prof-row-' + i;
    html += `<div id="${rowId}" style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px;">`;

    // View mode
    html += `<div id="${rowId}-view">`;
    html += `<div style="display:flex;align-items:baseline;gap:10px;margin-bottom:4px;">`;
    html += `<span style="font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--muted);">#${i+1}</span>`;
    html += `<span style="font-size:14px;font-weight:600;color:var(--text);flex:1;">${r.film}</span>`;
    html += `<span style="font-family:'Bebas Neue',sans-serif;font-size:28px;color:${personColor};line-height:1;">${raw.toFixed(2)}</span>`;
    html += `</div>`;
    if (r.date) html += `<div style="font-size:11px;color:var(--muted);margin-bottom:4px;">Watched: ${r.date}</div>`;
    if (r.notes) html += `<div style="font-size:12px;color:var(--muted);font-style:italic;margin-bottom:8px;">"${r.notes}"</div>`;
    // Category breakdown
    if (r.enjoyment !== undefined) {
      html += `<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;">`;
      CATEGORIES.forEach(cat => {
        const val = parseFloat(r[cat.id] || 0);
        html += `<span style="font-size:10px;padding:2px 7px;border-radius:10px;background:var(--surface2);color:var(--muted);">${cat.label.split(' ')[0]}: <strong style="color:var(--text)">${val.toFixed(1)}</strong></span>`;
      });
      html += `</div>`;
    }
    // Actions
    const escaped = encodeURIComponent(r.film);
    html += `<div style="display:flex;gap:8px;">`;
    html += `<button onclick="startEditReview(${i})" style="font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;background:var(--surface2);color:var(--muted);border:1px solid var(--border);cursor:pointer;">Edit</button>`;
    html += `<button onclick="deleteReview(${i}, '${r.person}')" style="font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;background:rgba(248,113,113,0.1);color:var(--danger);border:1px solid rgba(248,113,113,0.3);cursor:pointer;">Delete</button>`;
    html += `</div>`;
    html += `</div>`; // end view mode

    // Edit mode (hidden)
    html += `<div id="${rowId}-edit" style="display:none;">`;
    html += `<div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:10px;">Editing: ${r.film}</div>`;
    CATEGORIES.forEach(cat => {
      const val = parseFloat(r[cat.id] || 0);
      const sliderVal = Math.round(val * 2);
      html += `<div style="margin-bottom:8px;">`;
      html += `<div style="display:flex;justify-content:space-between;margin-bottom:3px;">`;
      html += `<span style="font-size:12px;color:var(--muted);">${cat.label} <span style="color:var(--muted);font-size:10px;">(${Math.round(cat.weight*100)}%)</span></span>`;
      html += `<span id="${rowId}-val-${cat.id}" style="font-size:12px;font-weight:700;color:var(--accent);">${val.toFixed(1)}</span>`;
      html += `</div>`;
      html += `<input type="range" id="${rowId}-slider-${cat.id}" min="0" max="10" value="${sliderVal}" step="1"
        oninput="updateEditSlider('${rowId}','${cat.id}',this.value)"
        style="width:100%;-webkit-appearance:none;appearance:none;height:4px;border-radius:2px;background:linear-gradient(to right, var(--accent) ${sliderVal*10}%, var(--border) ${sliderVal*10}%);outline:none;cursor:pointer;" />`;
      html += `</div>`;
    });
    html += `<div style="margin-bottom:8px;">`;
    html += `<div style="font-size:12px;color:var(--muted);margin-bottom:3px;">Notes</div>`;
    html += `<textarea id="${rowId}-notes" rows="2" style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:6px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;outline:none;resize:vertical;box-sizing:border-box;">${r.notes || ''}</textarea>`;
    html += `</div>`;
    html += `<div id="${rowId}-score" style="font-size:12px;color:var(--muted);margin-bottom:8px;"></div>`;
    html += `<div style="display:flex;gap:8px;">`;
    html += `<button onclick="saveEditReview('${rowId}', '${r.person}')" style="font-size:11px;font-weight:700;padding:5px 12px;border-radius:6px;background:var(--accent);color:var(--bg);border:none;cursor:pointer;">Save</button>`;
    html += `<button onclick="cancelEditReview('${rowId}')" style="font-size:11px;font-weight:700;padding:5px 12px;border-radius:6px;background:var(--surface2);color:var(--muted);border:1px solid var(--border);cursor:pointer;">Cancel</button>`;
    html += `</div>`;
    html += `</div>`; // end edit mode

    html += `</div>`; // end row
  });

  container.innerHTML = html;
  // Init edit slider backgrounds
  myReviews.forEach((r, i) => {
    CATEGORIES.forEach(cat => {
      const val = parseFloat(r[cat.id] || 0);
      updateEditSlider('prof-row-' + i, cat.id, Math.round(val * 2));
    });
  });
}

function updateEditSlider(rowId, catId, rawVal) {
  const pct = rawVal * 10;
  const slider = document.getElementById(`${rowId}-slider-${catId}`);
  if (slider) slider.style.background = `linear-gradient(to right, var(--accent) ${pct}%, var(--border) ${pct}%)`;
  const valEl = document.getElementById(`${rowId}-val-${catId}`);
  if (valEl) valEl.textContent = (rawVal / 2).toFixed(1);
  // Update score preview
  let raw = 0;
  CATEGORIES.forEach(cat => {
    const s = document.getElementById(`${rowId}-slider-${cat.id}`);
    if (s) raw += (parseInt(s.value) / 2) * cat.weight;
  });
  const scoreEl = document.getElementById(`${rowId}-score`);
  if (scoreEl) scoreEl.textContent = `Score: ${raw.toFixed(2)} / 5 · ${getRatingLabel(raw)}`;
}

function startEditReview(i, btn) {
  const rowId = 'prof-row-' + i;
  document.getElementById(rowId + '-view').style.display = 'none';
  document.getElementById(rowId + '-edit').style.display = '';
}

function cancelEditReview(rowId) {
  document.getElementById(rowId + '-view').style.display = '';
  document.getElementById(rowId + '-edit').style.display = 'none';
}

async function saveEditReview(rowId, person) {
  const review = window._profileReviews[parseInt(rowId.replace('prof-row-',''))];
  if (!review) { alert('Could not find review data.'); return; }

  let raw = 0;
  const scores = {};
  CATEGORIES.forEach(cat => {
    const val = parseInt(document.getElementById(`${rowId}-slider-${cat.id}`).value) / 2;
    scores[cat.id] = val;
    raw += val * cat.weight;
  });
  const notes = document.getElementById(`${rowId}-notes`).value;
  const rounded = Math.round(raw * 2) / 2;
  const pct = Math.round((raw / 5) * 100);

  const params = new URLSearchParams({
    action: 'edit',
    film: review.film,
    person,
    matchFilm: review.film,
    matchPerson: person,
    matchRaw: review.raw,
    notes: notes || '',
    raw: raw.toFixed(2),
    rounded: rounded.toFixed(1),
    pct,
    ...Object.fromEntries(CATEGORIES.map(cat => [cat.id, scores[cat.id]]))
  });

  try {
    const res = await fetch(REVIEWS_WEBHOOK_URL + '?' + params.toString());
    const text = await res.text();
    console.log('Edit response:', text);
    _reviewCache = null;
    await loadProfile(person);
  } catch(e) {
    alert('Error saving: ' + e.message);
  }
}

async function deleteReview(idx, person) {
  const review = window._profileReviews[idx];
  if (!review) { alert('Could not find review.'); return; }
  if (!confirm(`Delete ${person}'s review of "${review.film}"?`)) return;

  const params = new URLSearchParams({
    action: 'delete',
    matchFilm: review.film,
    matchPerson: person,
    matchRaw: review.raw,
  });

  try {
    const res = await fetch(REVIEWS_WEBHOOK_URL + '?' + params.toString());
    const text = await res.text();
    console.log('Delete response:', text);
    if (res.ok) {
      _reviewCache = null;
      await loadProfile(person);
    } else {
      alert('Unexpected response: ' + text);
    }
  } catch(e) {
    alert('Error deleting: ' + e.message);
  }
}

async function loadReviews() {
  const container = document.getElementById('rev-table-container');
